<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Hardware - C.A Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-900 font-sans flex h-screen overflow-hidden text-gray-200">

    <aside id="menu-lateral" class="w-64 bg-slate-950 border-r border-gray-800 flex flex-col h-full shadow-xl z-20"></aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative bg-gray-900 bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.3),rgba(255,255,255,0))]">
        
        <header class="p-6 border-b border-gray-800 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-blue-400 font-mono"><i class="fas fa-terminal mr-2"></i>[DEV] ADMS Simulator</h1>
                <p class="text-xs text-gray-500 font-mono mt-1">Inyección de Eventos Brutos a la Base de Datos</p>
            </div>
            <div class="flex items-center space-x-2 text-xs font-mono text-green-500 bg-gray-800 px-3 py-1.5 rounded border border-gray-700">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 flex justify-center items-start pt-10">
            <div class="w-full max-w-2xl bg-gray-800 border border-gray-700 rounded-xl shadow-2xl overflow-hidden">
                
                <div class="bg-gray-950 p-3 border-b border-gray-700 flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>

                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <!-- ID Biométrico -->
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-mono text-blue-400 mb-1">USER_BIO_ID <span class="text-red-500">*</span></label>
                            <input type="number" id="s_bio_id" placeholder="Ej. 102" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-200 font-mono focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        
                        <!-- Device ID -->
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-mono text-blue-400 mb-1">DEVICE_SN</label>
                            <input type="text" id="s_device" value="SIMULADOR-V1" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-500 font-mono outline-none" disabled>
                        </div>

                        <!-- Fecha -->
                        <div>
                            <label class="block text-xs font-mono text-blue-400 mb-1">TIMESTAMP_DATE <span class="text-red-500">*</span></label>
                            <input type="date" id="s_fecha" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-200 font-mono focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none [color-scheme:dark]">
                        </div>

                        <!-- Hora -->
                        <div>
                            <label class="block text-xs font-mono text-blue-400 mb-1">TIMESTAMP_TIME <span class="text-red-500">*</span></label>
                            <input type="time" id="s_hora" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-200 font-mono focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none [color-scheme:dark]">
                        </div>

                        <!-- Verify Mode -->
                        <div>
                            <label class="block text-xs font-mono text-blue-400 mb-1">VERIFY_MODE</label>
                            <select id="s_verify" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-200 font-mono focus:border-blue-500 outline-none">
                                <option value="1">1 - Huella Digital</option>
                                <option value="15">15 - Reconocimiento Facial</option>
                                <option value="4">4 - Tarjeta RFID</option>
                                <option value="3">3 - Contraseña</option>
                            </select>
                        </div>

                        <!-- Action / Punch State -->
                        <div>
                            <label class="block text-xs font-mono text-blue-400 mb-1">PUNCH_STATE (ACTION)</label>
                            <select id="s_action" class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-gray-200 font-mono focus:border-blue-500 outline-none">
                                <option value="0">0 - Entrada (Check-In)</option>
                                <option value="1">1 - Salida (Check-Out)</option>
                                <option value="2">2 - Inicio Almuerzo (Break-Out)</option>
                                <option value="3">3 - Fin Almuerzo (Break-In)</option>
                                <option value="4">4 - Entrada Extra (OT-In)</option>
                                <option value="5">5 - Salida Extra (OT-Out)</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-gray-700 flex justify-end">
                        <button onclick="inyectarEvento()" id="btnInyectar" class="bg-blue-600 hover:bg-blue-500 text-white font-mono px-6 py-3 rounded shadow-lg shadow-blue-900/50 transition-all flex items-center">
                            <i class="fas fa-satellite-dish mr-2"></i> FIRE EVENT (Inyectar)
                        </button>
                    </div>

                    <!-- Consola de Log Visual -->
                    <div class="bg-black rounded border border-gray-800 p-3 mt-4 h-32 overflow-y-auto font-mono text-xs text-green-400" id="terminalLog">
                        > Inicializando módulo ADMS TCP/IP Virtual...<br>
                        > Esperando paquete de datos...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="menu.js"></script>

    <script>
        const API_URL = "https://asistencia-api.up.railway.app";
        const token = localStorage.getItem('token');

        // Autocompletar con fecha y hora actual al abrir
        const hoy = new Date();
        document.getElementById('s_fecha').value = hoy.toISOString().split('T')[0];
        document.getElementById('s_hora').value = hoy.toTimeString().substring(0,5);

        function logTerminal(mensaje, tipo = "info") {
            const term = document.getElementById('terminalLog');
            const color = tipo === "error" ? "text-red-500" : (tipo === "success" ? "text-blue-400" : "text-green-400");
            const time = new Date().toLocaleTimeString();
            term.innerHTML += `<br><span class="text-gray-500">[${time}]</span> <span class="${color}">${mensaje}</span>`;
            term.scrollTop = term.scrollHeight; // Auto-scroll
        }

        async function inyectarEvento() {
            // Nota: Verifica que los IDs coincidan con tu HTML (s_bio_id o sim_bio_id)
            const bio_id = document.getElementById('s_bio_id') ? document.getElementById('s_bio_id').value : document.getElementById('sim_bio_id').value;
            const device_no = document.getElementById('s_device') ? document.getElementById('s_device').value : document.getElementById('sim_device_no').value;
            const fecha = document.getElementById('s_fecha').value;
            const hora = document.getElementById('s_hora').value;

            if(!bio_id || !device_no || !fecha || !hora) {
                mostrarError("Lector, Empleado, Fecha y Hora son obligatorios.", "Syntax Error");
                return;
            }

            // ⚡ FRONTEND TONTO: Une la fecha y hora agregando los segundos (:00)
            const fechaHoraString = `${fecha} ${hora}:00`;

            // El paquete (payload) limpio y directo que pide el nuevo backend
            const payload = {
                device_no: device_no,
                bio_id: bio_id.toString(),
                fecha_hora: fechaHoraString
            };

            const btn = document.getElementById('btnInyectar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> TRANSMITTING...';

            logTerminal(`> Preparando payload: ${JSON.stringify(payload)}`, "info");

            try {
                const res = await fetch(`${API_URL}/simulador/evento`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    logTerminal(`> FATAL: ${data.detail}`, "error");
                    throw new Error(data.detail);
                }
                
                logTerminal(`> ACK RECIBIDO: ${data.mensaje}`, "success");
                mostrarExito("Evento inyectado en la BD. Procesando en segundo plano...");
                
            } catch (error) {
                mostrarError(error.message, "Fallo de Transmisión");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-satellite-dish mr-2"></i> FIRE EVENT (Inyectar)';
            }
        }

        // Renderizamos el menú lateral de siempre, aunque sea la pantalla de desarrollo
        renderizarMenu('simulador'); // Puedes crear un ítem en menu.js luego si quieres
    </script>
</body>
</html>
