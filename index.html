<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A. Lector - Iniciar Sesión</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #f3f4f6;
            /* Esto crea el patrón de puntitos sutiles en el fondo del login */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans text-gray-800">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-gray-100">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">C.A. Lector</h1>
            <p class="text-gray-500 text-sm">Sistema de Control de Asistencia</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" name="email" required 
                    class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    placeholder="admin@sistema.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" name="password" required 
                    class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    placeholder="••••••••">
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-200">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        // Esta es la dirección de tu servidor Python en la nube. 
        // A este lugar enviaremos los correos y contraseñas a tocar la puerta.
        const API_URL = "https://asistencia-api.up.railway.app"; 

        // Interceptamos el momento exacto en el que el usuario hace clic en "Ingresar"
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            
            // e.preventDefault() es CRÍTICO: Evita que el navegador recargue la página entera 
            // o ponga la contraseña en la barra de direcciones (el error que tuvimos ayer).
            e.preventDefault(); 
            
            // 1. Extraemos lo que el usuario escribió en las cajas de texto
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Capturamos los elementos visuales que vamos a modificar
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');

            // 2. Experiencia de Usuario (UX): Cambiamos el texto del botón y lo desactivamos
            // para que el usuario no le haga clic 20 veces mientras carga.
            btn.textContent = "Verificando...";
            btn.disabled = true;
            errorDiv.classList.add('hidden'); // Ocultamos errores previos si los hubiera

            try {
                // 3. LA LLAMADA A LA API (Fetch): 
                // "Oye Railway, aquí tienes este JSON con un email y un password. ¿Son correctos?"
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', // POST porque estamos "enviando" datos privados
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // Convertimos la respuesta de Python (que viene en texto) a un objeto JavaScript
                const data = await response.json();

                // Si Python nos mandó un código de error (ej. 401 Credenciales incorrectas)
                if (!response.ok) {
                    throw new Error(data.detail || "Error al iniciar sesión");
                }

                // 4. GUARDAR EL "PASAPORTE" EN LA CAJA FUERTE DEL NAVEGADOR (localStorage)
                // localStorage es un espacio de memoria del navegador que no se borra al cerrar la pestaña.
                // Guardamos el token de seguridad y un resumen de quién es el usuario.
                localStorage.setItem('token', data.token);
                localStorage.setItem('userData', JSON.stringify({
                    nombre: data.nombre,
                    rol: data.rol,
                    empresa: data.empresa_nombre
                }));

                // 5. REDIRECCIÓN INTELIGENTE
                // Leemos el rol que nos devolvió Python y decidimos a qué pantalla enviarlo.
                if (data.rol === 'superadmin') {
                    window.location.href = 'dashboard_superadmin.html'; // Si eres tú, al panel maestro
                } else {
                    window.location.href = 'dashboard_cliente.html'; // Si es un cliente, a su panel privado
                }

            } catch (error) {
                // Si la contraseña estuvo mal o Railway falló, mostramos la caja roja de error
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            } finally {
                // Ya sea que haya funcionado o fallado, regresamos el botón a su estado normal
                btn.textContent = "Ingresar al Sistema";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
