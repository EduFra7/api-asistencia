<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Proyecto LEO — Superadmin</title>

<!-- Fonts: Geist & Geist Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        sans: ['Geist', 'system-ui', 'sans-serif'],
        mono: ['Geist Mono', 'monospace'],
      },
      colors: {
        brand: { blue: '#0c5078', red: '#c12425' },
        dark: {
          900: '#0a0a0a', 800: '#111111', 700: '#1a1a1a', 600: '#222222',
          border: '#262626'
        },
        light: { 50: '#f8fafc', 100: '#f1f5f9', border: '#e2e8f0' }
      },
      keyframes: {
        fadeInUp: { '0%': { opacity:'0', transform:'translateY(8px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
        shimmer:  { '0%': { backgroundPosition:'-600px 0' }, '100%': { backgroundPosition:'600px 0' } },
      },
      animation: {
        'fade-up': 'fadeInUp 0.28s cubic-bezier(0.16,1,0.3,1) forwards',
        'shimmer':  'shimmer 1.4s ease-in-out infinite',
      }
    }
  }
}
</script>

<!-- SweetAlert2 + ApexCharts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<!-- Anti-flash: tema resuelto antes del primer render -->
<script>
(function(){
  var s = localStorage.getItem('leo-theme');
  var sys = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  var t = (s === 'dark' || s === 'light') ? s : sys;
  if (t === 'dark') document.documentElement.classList.add('dark');
})();
</script>

<style>
/* ── Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { font-size: 14px; }
@media (min-width: 1024px) { html { font-size: 15px; } }
body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

/* Scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
.dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* Prevent layout shift from SweetAlert.
   swal2-height-auto agrega "height: auto !important" al body, colapsando h-screen
   y haciendo que h-full del sidebar recalcule a una altura menor → footer sube. */
body.swal2-shown,
body.swal2-height-auto {
  padding-right: 0 !important;
  height: 100vh !important;
  overflow: hidden !important;
}

/* Touch targets móviles */
@media (max-width: 768px) {
  input:not([type='checkbox']):not([type='radio']),
  select, button:not(.btn-icon) { min-height: 44px; }
}

/* SweetAlert2 overrides */
.swal2-popup {
  font-family: 'Geist', sans-serif !important;
  border-radius: 14px !important;
}
html.dark .swal2-popup { background-color: #111111 !important; color: #f8fafc !important; border: 1px solid #262626 !important; }
html.dark .swal2-title, html.dark .swal2-html-container { color: #f8fafc !important; }
html.dark .swal2-input, html.dark .swal2-select, html.dark .swal2-textarea {
  background: #1a1a1a !important; border-color: #404040 !important; color: white !important;
}
/* Backdrop blur cuando se abre cualquier modal SweetAlert */
.swal2-container.swal2-backdrop-show { backdrop-filter: blur(4px) !important; }

/* ── Sidebar ─────────────────────────────────── */
/* La barra lateral se expande al hacer hover (solo desktop).
   En mobile queda oculta y aparece al tocar el hamburger. */
#sidebar {
  transition: width 220ms cubic-bezier(0.16,1,0.3,1),
              transform 220ms cubic-bezier(0.16,1,0.3,1);
}
/* Cuando el drawer está abierto: sidebar fijado en ancho expandido */
#sidebar.sb-pinned { width: 16rem !important; }
/* Ocultar labels cuando el sidebar está colapsado (desktop) */
@media (min-width: 768px) {
  #sidebar:not(.sb-pinned) .sb-label { opacity: 0; pointer-events: none; transition: opacity 150ms; }
  #sidebar:not(.sb-pinned):hover .sb-label { opacity: 1; transition: opacity 150ms 80ms; }
  #sidebar:not(.sb-pinned) .sb-user-text { opacity: 0; transition: opacity 150ms; }
  #sidebar:not(.sb-pinned):hover .sb-user-text { opacity: 1; transition: opacity 150ms 80ms; }
  #sidebar:not(.sb-pinned) .sb-brand-text { opacity: 0; transition: opacity 150ms; }
  #sidebar:not(.sb-pinned):hover .sb-brand-text { opacity: 1; transition: opacity 150ms 80ms; }
  #sidebar:not(.sb-pinned) .sb-logout { opacity: 0; transition: opacity 150ms; }
  #sidebar:not(.sb-pinned):hover .sb-logout { opacity: 1; transition: opacity 150ms 80ms; }
}

/* ── Skeleton shimmer ────────────────────────── */
.skel {
  background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: 6px;
}
.dark .skel {
  background: linear-gradient(90deg, #1a1a1a 25%, #222222 50%, #1a1a1a 75%);
  background-size: 600px 100%;
}

/* ── KPI counter animation ──────────────────── */
@keyframes count-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kpi-ready { animation: count-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }

/* ── Alert panel / card rows ─────────────────── */
.alert-row-ok {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 8px;
  background: #f0fdf4; color: #16a34a; font-size: 12px; font-weight: 600;
}
.dark .alert-row-ok { background: rgba(22,163,74,.08); color: #4ade80; }

/* ── Uso bar ─────────────────────────────────── */
.uso-bar {
  width: 100%; height: 3px; background: #e2e8f0;
  border-radius: 99px; overflow: hidden; margin-top: 4px;
}
.dark .uso-bar { background: #262626; }
.uso-fill { height: 100%; border-radius: 99px; background: #0c5078; }
.uso-fill.warn { background: #d97706; }
.uso-fill.full { background: #c12425; }

/* ── Dot indicador ───────────────────────────── */
.dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  display: inline-block;
}
.dot-ok   { background: #16a34a; }
.dot-err  { background: #c12425; }
.dot-warn { background: #d97706; }
@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,.5); }
  60%       { box-shadow: 0 0 0 5px rgba(22,163,74,0); }
}
.dot-pulse { animation: dot-pulse 2s ease-in-out infinite; }

/* ── Stat pill ────────────────────────────────── */
.stat-pill {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 16px;
  background: white; border: 1px solid #e2e8f0;
  border-radius: 10px; min-width: 72px;
}
.dark .stat-pill { background: #111111; border-color: #262626; }

/* ── Tabla móvil → cards ──────────────────────── */
@media (max-width: 640px) {
  .mobile-table, .mobile-table thead, .mobile-table tbody,
  .mobile-table th, .mobile-table td, .mobile-table tr { display: block; }
  .mobile-table thead tr { position: absolute; top: -9999px; left: -9999px; }
  .mobile-table tr {
    background: white; border: 1px solid #e2e8f0 !important;
    border-radius: 12px; margin-bottom: 12px; padding: 4px 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .dark .mobile-table tr { background: #111111; border-color: #262626 !important; }
  .mobile-table td {
    border: none; border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between;
    align-items: center; padding: 10px 0; text-align: right;
  }
  .dark .mobile-table td { border-bottom-color: #262626; }
  .mobile-table td:last-child { border-bottom: none; }
  .mobile-table td::before {
    content: attr(data-label);
    font-weight: 700; color: #64748b; font-size: 10px;
    text-transform: uppercase; margin-right: 12px; text-align: left;
    flex-shrink: 0;
  }
}

/* Loading screen */
#loading-screen {
  position: fixed; inset: 0;
  background: #090d14;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 200;
  transition: opacity 220ms ease-out;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-ring {
  width: 28px; height: 28px;
  border: 2px solid rgba(255,255,255,.12);
  border-top-color: #0c5078;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

/* ── ⌘K Command Palette ─────────────────────────── */
#kbOverlay { display: none; }
#kbOverlay.kb-open { display: flex; }
#kbResults li.kb-active { background: rgba(12,80,120,0.08); }
html.dark #kbResults li.kb-active { background: rgba(12,80,120,0.15); }
#kbResults li { list-style: none; }
</style>
</head>

<body class="bg-light-50 dark:bg-dark-900 text-slate-800 dark:text-slate-200 h-screen flex overflow-hidden">

<!-- ═══════════════════════════════════════════════════
     LOADING SCREEN
═══════════════════════════════════════════════════ -->
<div id="loading-screen">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none" aria-hidden="true">
    <rect width="44" height="44" rx="10" fill="rgba(255,255,255,.06)"/>
    <path d="M11 33V11h4v18h12v4H11z" fill="rgba(255,255,255,.9)"/>
    <circle cx="32" cy="13" r="3.5" fill="#3a9fd4"/>
  </svg>
  <div class="loader-ring"></div>
  <p style="font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.1em;color:rgba(255,255,255,.35);text-transform:uppercase;">Iniciando&hellip;</p>
</div>

<!-- ═══════════════════════════════════════════════════
     MOBILE OVERLAY
═══════════════════════════════════════════════════ -->
<div id="mobileOverlay"
     class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm"
     onclick="closeMobileSidebar()"></div>

<!-- ═══════════════════════════════════════════════════
     DRAWER OVERLAY + PANEL
═══════════════════════════════════════════════════ -->
<div id="drOverlay"
     class="fixed inset-0 bg-black/50 z-[45] hidden opacity-0 backdrop-blur-[2px] transition-opacity duration-200"
     onclick="closeDrawer()"></div>

<div id="drPanel"
     class="fixed inset-y-0 right-0 w-full md:w-[500px] bg-white dark:bg-dark-800 z-50 transform translate-x-full transition-transform duration-250 ease-out flex flex-col border-l border-light-border dark:border-dark-border shadow-2xl">
  <div class="flex items-center justify-between px-6 py-4 border-b border-light-border dark:border-dark-border shrink-0">
    <div>
      <h3 class="font-semibold text-base text-slate-900 dark:text-white" id="drTitle">—</h3>
      <p class="text-[10px] text-slate-500 font-mono mt-0.5" id="drSubtitle"></p>
    </div>
    <button onclick="closeDrawer()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-dark-700 text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors">
      <i class="fas fa-xmark text-sm"></i>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto p-6 space-y-5" id="drBody"></div>
  <div class="px-6 py-4 border-t border-light-border dark:border-dark-border flex gap-3 justify-end shrink-0" id="drFoot" style="display:none!important;"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════════ -->
<aside id="sidebar"
       class="w-64 md:w-16 md:hover:w-64 group flex flex-col border-r border-light-border dark:border-dark-border bg-white dark:bg-dark-800 z-40 absolute md:relative h-full -translate-x-full md:translate-x-0 shadow-2xl md:shadow-none shrink-0 overflow-hidden">

  <!-- Brand -->
  <div class="h-14 flex items-center gap-3 px-3 border-b border-light-border dark:border-dark-border shrink-0">
    <div class="w-8 h-8 rounded-lg bg-brand-blue flex items-center justify-center shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M7 17V7h2.5v8H15v2H7z" fill="white"/>
        <circle cx="16" cy="8.5" r="2" fill="rgba(255,255,255,.7)"/>
      </svg>
    </div>
    <div class="sb-brand-text whitespace-nowrap overflow-hidden">
      <p class="font-bold text-sm text-slate-900 dark:text-white leading-none">Proyecto LEO</p>
      <p class="text-[10px] text-slate-400 mt-0.5" id="sidebarRolLabel">Panel</p>
    </div>
    <button onclick="closeMobileSidebar()" class="md:hidden ml-auto text-slate-400 hover:text-slate-700 dark:hover:text-white p-1">
      <i class="fas fa-xmark"></i>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden py-2 px-2 space-y-0.5">

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-brand-blue dark:text-white bg-slate-100 dark:bg-dark-700"
            data-vista="resumen" onclick="cambiarVista('resumen', this)">
      <i class="fas fa-chart-pie w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Resumen</span>
    </button>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="empresas" onclick="cambiarVista('empresas', this)">
      <i class="fas fa-building w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Empresas</span>
    </button>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="hardware" onclick="cambiarVista('hardware', this)">
      <i class="fas fa-microchip w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Hardware</span>
    </button>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="finanzas" onclick="cambiarVista('finanzas', this)">
      <i class="fas fa-coins w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Finanzas</span>
    </button>

    <!-- Buscador ⌘K -->
    <button onclick="abrirKB()"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 dark:text-slate-500
                   hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-700 dark:hover:text-slate-300
                   transition-colors text-sm border border-dashed border-light-border dark:border-dark-border">
      <i class="fas fa-search w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label flex-1 text-left text-[12px]">Buscar…</span>
      <kbd class="sb-label text-[9px] bg-slate-100 dark:bg-dark-700 px-1.5 py-0.5 rounded font-mono shrink-0">⌘K</kbd>
    </button>

    <div class="my-2 border-t border-light-border dark:border-dark-border"></div>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="feriados" onclick="cambiarVista('feriados', this)">
      <i class="fas fa-calendar-days w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Feriados Globales</span>
    </button>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="auditoria" onclick="cambiarVista('auditoria', this)">
      <i class="fas fa-shield-halved w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Auditoría</span>
    </button>

    <button class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="configuraciones" onclick="cambiarVista('configuraciones', this)">
      <i class="fas fa-gear w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Configuraciones</span>
    </button>

    <button id="nav-administradores"
            class="hidden menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white"
            data-vista="administradores" onclick="cambiarVista('administradores', this)">
      <i class="fas fa-user-shield w-5 text-center shrink-0 text-[13px]"></i>
      <span class="sb-label whitespace-nowrap">Administradores</span>
    </button>

  </nav>

  <!-- Footer: theme + user -->
  <div class="p-2 border-t border-light-border dark:border-dark-border space-y-1 shrink-0">

    <!-- User -->
    <div class="flex items-center gap-3 px-3 py-2 overflow-hidden">
      <div class="w-7 h-7 rounded-full bg-slate-200 dark:bg-dark-700 flex items-center justify-center text-[10px] font-bold text-slate-700 dark:text-slate-200 shrink-0" id="sidebarAvatar">SA</div>
      <div class="sb-user-text whitespace-nowrap overflow-hidden">
        <p class="text-xs font-semibold text-slate-900 dark:text-white truncate" id="sidebarUserName">Cargando…</p>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 dot-pulse flex-shrink-0"></span>
          <span class="text-[10px] text-slate-400" id="sb-session-badge">SuperAdmin</span>
        </div>
      </div>
    </div>

    <!-- Actions row -->
    <div class="flex gap-1">
      <button onclick="toggleTheme()"
              class="flex-1 flex items-center justify-center py-2 px-3 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-dark-700 hover:text-slate-900 dark:hover:text-white transition-colors"
              title="Cambiar tema">
        <i class="fas fa-moon dark:hidden text-sm"></i>
        <i class="fas fa-sun hidden dark:block text-sm"></i>
      </button>
      <button onclick="cerrarSesion()"
              class="sb-logout flex-1 flex items-center justify-center py-2 px-3 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors"
              title="Cerrar sesión">
        <i class="fas fa-right-from-bracket text-sm"></i>
      </button>
    </div>

  </div>
</aside>

<!-- ═══════════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════════ -->
<main class="flex-1 flex flex-col min-w-0 h-screen relative">

  <!-- Topbar -->
  <header class="h-14 border-b border-light-border dark:border-dark-border bg-white/80 dark:bg-dark-900/80 backdrop-blur-sm flex items-center justify-between px-4 md:px-6 z-20 shrink-0">
    <div class="flex items-center gap-3">
      <!-- Hamburger móvil -->
      <button onclick="openMobileSidebar()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-dark-700 transition-colors">
        <i class="fas fa-bars text-sm"></i>
      </button>
      <!-- Breadcrumb -->
      <div class="hidden md:flex items-center gap-2 text-sm text-slate-400 dark:text-slate-500">
        <i class="fas fa-satellite-dish text-brand-blue text-xs"></i>
        <span>Proyecto LEO</span>
        <i class="fas fa-chevron-right text-[9px]"></i>
        <span id="headerTitle" class="text-slate-700 dark:text-slate-200 font-medium">Resumen</span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Notificaciones -->
      <div class="relative">
        <button onclick="toggleNotifications()"
                class="relative w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-dark-700 transition-colors focus:outline-none">
          <i class="fas fa-bell text-sm"></i>
          <span id="notifBadge" class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-brand-red hidden border-2 border-white dark:border-dark-900"></span>
        </button>
        <!-- Notification dropdown -->
        <div id="notifDropdown"
             class="absolute right-0 mt-2 w-80 bg-white dark:bg-dark-800 rounded-xl shadow-2xl border border-light-border dark:border-dark-border hidden z-50">
          <div class="flex items-center justify-between p-4 border-b border-light-border dark:border-dark-border">
            <h3 class="font-semibold text-sm text-slate-900 dark:text-white">Notificaciones</h3>
            <span id="notifCount" class="text-[10px] font-mono text-slate-500 bg-slate-100 dark:bg-dark-700 px-2 py-0.5 rounded">0</span>
          </div>
          <div id="notifList" class="max-h-72 overflow-y-auto">
            <div class="p-6 text-center text-xs text-slate-400">Sin notificaciones</div>
          </div>
        </div>
      </div>
    </div>

/* Parchear Swal.fire: blur automático; sidebar se fija solo si ya estaba expandido */
(function patchSwal() {
  const _orig = Swal.fire.bind(Swal);
  Swal.fire = async function (...args) {
    const sb = document.getElementById('sidebar');
    if (sb) sb.classList.add('sb-pinned');
    try {
      return await _orig(...args);
    } finally {
      /* Liberar solo si drawer también está cerrado */
      const drawerClosed = document.getElementById('drPanel')?.classList.contains('translate-x-full') ?? true;
      if (sb && drawerClosed) sb.classList.remove('sb-pinned');

})();

function initAuth() {
  const token = localStorage.getItem('token');

  if (!token || !raw) { window.location.href = 'index.html'; return; }
  try {
    State.token    = token;

    if (!['superadmin', 'administrador'].includes(State.userData.rol)) { window.location.href = 'index.html'; return; }
    _actualizarSidebarPerfil(State.userData.nombre, State.userData.apellido, State.userData.rol);

    }
    // Sync de perfil entre pestañas del mismo navegador
    window.addEventListener('storage', e => {
      if (e.key === 'userData' && e.newValue) {
        try {
          const d = JSON.parse(e.newValue);
          State.userData = d;
          _actualizarSidebarPerfil(d.nombre, d.apellido, d.rol);

/* ═══════════════════════════════════════════════════
   FETCH HELPER
═══════════════════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const res = await fetch(`${API_URL}${path}`, {
    ...opts,
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${State.token}`,
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) {
    localStorage.removeItem('token'); localStorage.removeItem('userData');
    window.location.href = 'index.html';
    throw new Error('No autorizado');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `Error ${res.status}`);
  }
  return res.json();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtFecha(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr); if (isNaN(d)) return String(isoStr).slice(0, 16);
  const now = new Date(); const diff = Math.floor((now - d) / 1000);
  if (diff < 60)     return 'Ahora mismo';
  if (diff < 3600)   return `hace ${Math.floor(diff/60)} min`;
  if (diff < 86400)  return `hace ${Math.floor(diff/3600)} h`;
  if (diff < 172800) return 'Ayer';
  return d.toLocaleDateString('es-BO', { day:'numeric', month:'short' });
}

function fmtTiempo(mins) {
  if (!mins || mins >= 999999) return 'Nunca conectado';
  if (mins < 60) return `${mins} min`;
  if (mins < 1440) return `${Math.floor(mins/60)} h`;
  return `${Math.floor(mins/1440)} días`;
}

function toast(msg, type = 'ok') {
  const colors = { ok:'#16a34a', err:'#c12425', warn:'#d97706', info:'#0c5078' };
  const icons  = { ok:'fa-circle-check', err:'fa-circle-xmark', warn:'fa-triangle-exclamation', info:'fa-circle-info' };
  Swal.mixin({
    toast: true, position: 'bottom-end',
    showConfirmButton: false, timer: 3200, timerProgressBar: true,
  }).fire({ icon: type === 'ok' ? 'success' : type === 'err' ? 'error' : 'warning', title: msg });
}

function mostrarError(msg)      { Swal.fire({ title:'Error', text: msg, icon:'error', confirmButtonColor:'#0c5078' }); }
function mostrarExito(msg)      { toast(msg, 'ok'); }

async function pedirConfirmacion(titulo, texto, btnTxt = 'Confirmar') {

    showCancelButton: true, confirmButtonText: btnTxt, cancelButtonText: 'Cancelar',

function filasEmpresasResumen(lista) {
  if (!lista.length) return `
    <tr><td colspan="4" class="py-14 text-center">
      <i class="fas fa-building text-3xl text-slate-200 dark:text-dark-700 block mb-3"></i>
      <p class="text-xs font-medium text-slate-500">No hay empresas registradas</p>
    </td></tr>`;

  return lista.map(emp => {
    const usoPct  = Math.round(((emp.total_empleados || 0) / (emp.limite_usuarios || 50)) * 100);
    const usoFill = usoPct > 90 ? 'full' : usoPct > 70 ? 'warn' : '';
    const vencido = emp.fecha_vencimiento && emp.fecha_vencimiento !== '2099-12-31' &&
                    new Date(emp.fecha_vencimiento) < new Date();
    const badge   = vencido
      ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 dark:bg-red-900/30 text-brand-red">Vencido</span>`
      : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400">Al día</span>`;
    const inicial = (emp.nombre || '?').charAt(0).toUpperCase();
    return `
      <tr class="hover:bg-slate-50 dark:hover:bg-dark-700 cursor-pointer transition-colors group"
          onclick="cambiarVista('empresas', document.querySelector('[data-vista=empresas]'))">
        <td class="px-5 py-3" data-label="Empresa">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-brand-blue/20 text-brand-blue dark:text-blue-400 font-bold text-sm flex items-center justify-center shrink-0">${inicial}</div>
            <div>
              <p class="font-medium text-slate-900 dark:text-white group-hover:text-brand-blue transition-colors">${esc(emp.nombre)}</p>
              <p class="text-[11px] text-slate-500">${esc(emp.ciudad || 'Sin ciudad')}</p>
            </div>
          </div>
        </td>
        <td class="px-5 py-3" data-label="Plan">
          <p class="font-medium text-slate-900 dark:text-white text-xs">${esc(emp.plan_nombre || 'Básico')}</p>
          <div class="uso-bar w-20"><div class="uso-fill ${usoFill}" style="width:${Math.min(usoPct,100)}%"></div></div>
          <p class="text-[10px] text-slate-500 mt-1">${emp.total_empleados||0} de ${emp.limite_usuarios||'?'}</p>
        </td>
        <td class="px-5 py-3" data-label="Estado">
          ${badge}
          <p class="text-[10px] text-slate-500 mt-1">${emp.fecha_vencimiento || 'Indefinido'}</p>
        </td>
        <td class="px-5 py-3 text-right" data-label="Ir">
          <i class="fas fa-arrow-right text-xs text-slate-300 dark:text-slate-600 group-hover:text-brand-blue transition-colors"></i>
        </td>
      </tr>`;
  }).join('');
}

function filtrarEmpresasResumen(q) {
  const txt  = (q || '').toLowerCase().trim();
  const lista = txt ? State.empresas.filter(e => (e.nombre||'').toLowerCase().includes(txt)) : State.empresas;
  const tbody = document.getElementById('tbodyResumen');
  if (tbody) tbody.innerHTML = filasEmpresasResumen(lista);
}

/* ═══════════════════════════════════════════════════
   HELPERS — VENCIMIENTO
═══════════════════════════════════════════════════ */
function estaVencida(emp) {
  return emp.fecha_vencimiento &&
         emp.fecha_vencimiento !== '2099-12-31' &&
         new Date(emp.fecha_vencimiento) < new Date();
}
function diasHastaVencer(emp) {
  if (!emp.fecha_vencimiento) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const v   = new Date(emp.fecha_vencimiento); v.setHours(0,0,0,0);
  return Math.round((v - hoy) / 86400000);
}
function fmtVencimiento(emp) {
  const dias  = diasHastaVencer(emp);
  if (dias === null) return '<span class="text-slate-400">—</span>';
  const fecha = new Date(emp.fecha_vencimiento).toLocaleDateString('es-BO',{day:'2-digit',month:'short',year:'numeric'});
  if (dias < 0)  return `<span class="text-brand-red font-semibold">${fecha} <small>(venció)</small></span>`;
  if (dias < 7)  return `<span class="text-brand-red font-semibold">${fecha} <small>(${dias}d)</small></span>`;
  if (dias < 30) return `<span class="text-amber-500 font-medium">${fecha} <small>(${dias}d)</small></span>`;
  return `<span class="text-slate-500">${fecha}</span>`;
}

  const vencidas   = State.empresas.filter(e => estaVencida(e) && e.estado_suscripcion !== 'suspendido').length;
  const tagsDisp   = [...new Set((State.empresas || []).flatMap(e => e.tags || []))].sort();
  const tagOpts    = tagsDisp.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');

  document.getElementById('content').innerHTML = `
  <div class="max-w-6xl mx-auto space-y-5 animate-fade-up">

      <div>
        <h1 class="text-2xl font-semibold text-slate-900 dark:text-white tracking-tight">Empresas</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Gestión de clientes y licencias.</p>

                class="flex items-center gap-1.5 px-3 py-2 text-sm font-semibold text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-700/40 hover:bg-emerald-100 dark:hover:bg-emerald-900/30 rounded-lg transition-colors shadow-sm">

                class="flex items-center gap-2 px-3 py-2 text-sm font-semibold text-white bg-brand-blue hover:bg-blue-900 rounded-lg transition-colors shadow-sm">

        </button>`).join('')}
    </div>

    <!-- Tabla -->
    <div class="bg-white dark:bg-dark-800 rounded-xl border border-light-border dark:border-dark-border shadow-sm overflow-hidden">

function setFiltroEstado(estado) {
  _filtroEstadoEmp = estado;
  document.querySelectorAll('[id^="pill-"]').forEach(p => p.classList.remove('border-brand-blue'));
  const pill = document.getElementById(`pill-${estado}`);
  if (pill) pill.classList.add('border-brand-blue');
  const sel = document.getElementById('filtro-estado-emp');
  if (sel) sel.value = estado;
  aplicarFiltrosEmp();
}

function aplicarFiltrosEmp() {
  const q      = (document.getElementById('buscar-emp')?.value || '').toLowerCase().trim();
  const estado = document.getElementById('filtro-estado-emp')?.value || 'todos';
  _filtroEstadoEmp = estado;

  let lista = State.empresas;
  if (q) lista = lista.filter(e =>
    (e.nombre||'').toLowerCase().includes(q) ||
    (e.ciudad||'').toLowerCase().includes(q) ||
    (e.nit||'').toLowerCase().includes(q));
  if (estado === 'activas')     lista = lista.filter(e => !estaVencida(e) && e.estado_suscripcion !== 'suspendido');
  if (estado === 'vencidas')    lista = lista.filter(e => estaVencida(e) && e.estado_suscripcion !== 'suspendido');
  if (estado === 'suspendidas') lista = lista.filter(e => e.estado_suscripcion === 'suspendido');
  const filtroTag = document.getElementById('filtro-tag-emp')?.value || '';
  if (filtroTag) lista = lista.filter(e => (e.tags || []).includes(filtroTag));

  const tbody = document.getElementById('tbody-emp');
  if (!tbody) return;

  if (!lista.length) {
    const esBusqueda = q || estado !== 'todos';
    tbody.innerHTML = `<tr><td colspan="5">
      <div class="flex flex-col items-center justify-center py-14 gap-4 text-slate-400">

  lista = sortedEmpresas(lista);

/* ── Checkbox módulo (live, guardado con botón) ── */
function toggleModuloCheckbox(key, checked) {
  const label = document.getElementById(`mt-${key}`);
  if (label) label.dataset.val = String(checked);
}

/* ── Guardar permisos módulos ── */
async function guardarPermisosModulos(empId) {
  const emp = State.empresas.find(e => e.id === empId);
  if (!emp) return;
  const payload = {};
  MODULOS_SISTEMA.forEach(k => {
    const label = document.getElementById(`mt-${k}`);
    const cb    = label?.querySelector('input[type=checkbox]');
    payload[k] = cb ? cb.checked : (emp.modulos?.[k] !== false);
  });
  try {
    await apiFetch(`/superadmin/empresas/${empId}/permisos`, { method:'PUT', body:JSON.stringify(payload) });
    emp.modulos = payload;
    toast('Módulos guardados correctamente', 'ok');
  } catch (err) { mostrarError(err.message); }
}

/* ── Suspender / Reactivar ── */
async function toggleEstadoEmpresa(empId, esSuspendida, fromDrawer = false) {
  const emp = State.empresas.find(e => e.id === empId);
  const conf = await pedirConfirmacion(
    `¿${esSuspendida ? 'Reactivar' : 'Suspender'} empresa?`,
    `Esta acción ${esSuspendida ? 'habilitará' : 'bloqueará'} el acceso de "${emp?.nombre||'la empresa'}".`,
    esSuspendida ? 'Sí, reactivar' : 'Sí, suspender'
  );
  if (!conf.isConfirmed) return;
  try {
    await apiFetch(`/empresas/${empId}/toggle-estado`, { method:'PUT' });
    toast(`Empresa ${esSuspendida ? 'reactivada' : 'suspendida'}`, esSuspendida ? 'ok' : 'warn');
    if (fromDrawer) closeDrawer();
    await cargarEmpresas();
  } catch (err) { mostrarError(err.message); }
}

/* ── Eliminar empresa ── */
async function eliminarEmpresa(empId, nombre) {
  const conf = await Swal.fire({
    icon: 'warning', title: '¿Eliminar empresa?',
    html: `Esta acción es <strong>irreversible</strong>. Se eliminarán todos los datos de <strong>${esc(nombre)}</strong>.`,
    input: 'text', inputPlaceholder: `Escriba "${nombre}" para confirmar`,
    showCancelButton: true, confirmButtonText: 'Eliminar permanentemente', cancelButtonText: 'Cancelar',
    confirmButtonColor: '#c12425',
    preConfirm: (val) => { if (val !== nombre) { Swal.showValidationMessage('El nombre no coincide'); return false; } return true; },
  });
  if (!conf.isConfirmed) return;
  try {
    await apiFetch(`/empresas/${empId}`, { method:'DELETE' });
    closeDrawer();
    toast(`"${nombre}" eliminada`, 'ok');
    await cargarEmpresas();
  } catch (err) { mostrarError(err.message); }
}

/* ── Impersonar ── */
async function impersonarEmpresa(empId, nombre) {
  const conf = await pedirConfirmacion(
    `Acceder como "${nombre}"`,
    'Se generará un token de soporte con acceso completo a esta empresa.',
    'Sí, acceder'
  );
  if (!conf.isConfirmed) return;
  try {
    const data = await apiFetch(`/superadmin/impersonate/${empId}`, { method:'POST' });
    localStorage.setItem('token_superadmin_backup', State.token);
    localStorage.setItem('userData_superadmin_backup', localStorage.getItem('userData') || '');
    localStorage.setItem('impersonating_empresa', nombre);
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('userData', JSON.stringify(data.userData || data));
    window.location.href = 'dashboard_cliente.html';
  } catch (err) { mostrarError(err.message); }
}

    const rows  = pagos.length

async function cargarFinanzas() {
  document.getElementById('content').innerHTML = skeletonFinanzas();
  try {
    const data = await apiFetch('/superadmin/contabilidad');
    renderFinanzas(data);
  } catch (err) {
    document.getElementById('content').innerHTML = errorView('Finanzas','coins',err.message,'cargarFinanzas()');
  }
}

function skeletonFinanzas() {
  return `
  <div class="max-w-6xl mx-auto space-y-5 animate-fade-up">
    <div class="flex items-center justify-between pb-4 border-b border-light-border dark:border-dark-border">

function renderFinanzas(data) {
  const historial  = data.historial || [];
  const balancePos = (data.balance_neto || 0) >= 0;
  State._finData   = historial;

  /* Métricas avanzadas (frontend-only, sin requests extra) */
  const mrrVal       = parseFloat(data.mrr || 0);
  const arrProyect   = mrrVal * 12;
  const empsF        = State.empresas || [];
  const activasF     = empsF.filter(e => e.estado_suscripcion !== 'suspendido' && !estaVencida(e));
  const suspF        = empsF.filter(e => e.estado_suscripcion === 'suspendido');
  const totalF       = activasF.length + suspF.length;
  const churnRateF   = totalF > 0 ? (suspF.length / totalF * 100) : null;
  const arpuF        = activasF.length > 0 && mrrVal > 0 ? mrrVal / activasF.length : null;
  const ltvF         = churnRateF > 0 && arpuF ? arpuF / (churnRateF / 100) : null;
  const mesActualF   = new Date().toISOString().slice(0, 7);
  const pagaronF     = activasF.filter(e => e.ultimo_pago && String(e.ultimo_pago).slice(0,7) === mesActualF).length;
  const tasaCobroF   = activasF.length > 0 ? Math.round(pagaronF / activasF.length * 100) : null;
  const pendPagoF    = activasF.filter(e => !e.ultimo_pago || String(e.ultimo_pago).slice(0,7) !== mesActualF);

  document.getElementById('content').innerHTML = `
  <div class="max-w-6xl mx-auto space-y-5 animate-fade-up">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 pb-4 border-b border-light-border dark:border-dark-border">
      <div>
        <h1 class="text-2xl font-semibold text-slate-900 dark:text-white tracking-tight">Flujo de Caja</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Métricas de ingresos recurrentes y egresos.</p>
      </div>
      <div class="flex gap-2 shrink-0">
        <button onclick="cargarFinanzas()"
                class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 bg-white dark:bg-dark-800 border border-light-border dark:border-dark-border hover:bg-slate-50 dark:hover:bg-dark-700 transition-colors shadow-sm">
          <i class="fas fa-rotate-right text-xs"></i>
        </button>
        <button onclick="formNuevoGasto()"
                class="flex items-center gap-2 px-3 py-2 text-sm font-semibold text-white bg-brand-red hover:bg-red-800 rounded-lg transition-colors shadow-sm">
          <i class="fas fa-minus-circle text-xs"></i> Registrar egreso
        </button>
      </div>
    </div>

function filaFinanzas(lista) {
  if (!lista.length) return `<tr><td colspan="5">
    <div class="flex flex-col items-center justify-center py-14 gap-3 text-slate-400">
      <i class="fas fa-receipt text-3xl opacity-30"></i>
      <p class="text-sm font-medium text-slate-500">Sin movimientos registrados</p>
    </div>
  </td></tr>`;

  return lista.map(h => {
    const esIngreso = h.tipo_movimiento === 'ingreso';
    const badge = esIngreso
      ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400"><i class="fas fa-arrow-down text-[8px]"></i>Ingreso</span>`
      : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-100 dark:bg-red-900/30 text-brand-red"><i class="fas fa-arrow-up text-[8px]"></i>Egreso</span>`;
    return `
      <tr class="hover:bg-slate-50 dark:hover:bg-dark-700 transition-colors">
        <td class="px-5 py-3" data-label="Tipo">${badge}</td>
        <td class="px-5 py-3" data-label="Entidad">
          <p class="font-semibold text-slate-900 dark:text-white text-[13px]">${esc(h.entidad||'—')}</p>
          <p class="text-[11px] text-slate-500">${esc(h.concepto||'—')}</p>
        </td>
        <td class="px-5 py-3 text-[12px] text-slate-500" data-label="Referencia">${esc(h.comprobante_ref||'—')}</td>
        <td class="px-5 py-3 text-[12px] text-slate-500" data-label="Fecha" title="${esc(String(h.fecha||'').slice(0,16))}">${fmtFecha(h.fecha)}</td>
        <td class="px-5 py-3 text-right" data-label="Monto">
          <span class="font-mono text-sm font-semibold ${esIngreso ? 'text-emerald-600 dark:text-emerald-400' : 'text-brand-red'}">
            ${esIngreso ? '+' : '−'} Bs ${Number(h.monto||0).toFixed(2)}
          </span>
        </td>
      </tr>`;
  }).join('');
}

function filtrarFinanzas() {
  if (!State._finData) return;
  const tipo  = document.getElementById('filtro-fin')?.value || 'todos';
  const lista = tipo === 'todos' ? State._finData : State._finData.filter(h => h.tipo_movimiento === tipo);
  const tbody = document.getElementById('tbody-fin');
  if (tbody) tbody.innerHTML = filaFinanzas(lista);
}

function pintarGraficaMRR(historial) {
  const el = document.querySelector('#chart_mrr');
  if (!el) return;
  if (State._mrrChart) { State._mrrChart.destroy(); State._mrrChart = null; }

  /* Agrupar ingresos por mes (últimos 8) */
  const meses = {};
  (historial || []).forEach(h => {
    if (h.tipo_movimiento !== 'ingreso') return;
    const k = String(h.fecha||'').slice(0,7);
    if (!k) return;
    meses[k] = (meses[k]||0) + (parseFloat(h.monto)||0);
  });
  const claves = Object.keys(meses).sort().slice(-8);
  const cats   = claves.map(k => { const [y,m] = k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('es-BO',{month:'short',year:'2-digit'}); });
  const vals   = claves.map(k => Math.round(meses[k]));

  /* Si no hay datos reales, usar demo */
  const usarDemo = cats.length < 2;
  const finalCats = usarDemo ? ['Ene','Feb','Mar','Abr','May','Jun'] : cats;
  const finalVals = usarDemo ? [1500,1800,2200,2100,2600,3100]       : vals;

  const isDark = document.documentElement.classList.contains('dark');
  const textColor = isDark ? '#a3a3a3' : '#737373';
  const gridColor = isDark ? '#262626' : '#f5f5f5';

  State._mrrChart = new ApexCharts(el, {
    series: [{ name:'MRR (Bs)', data: finalVals }],
    chart: { type:'area', height:240, toolbar:{ show:false }, fontFamily:'Geist, sans-serif', background:'transparent' },
    colors: ['#0c5078'],
    fill:  { type:'gradient', gradient:{ shadeIntensity:1, opacityFrom:0.35, opacityTo:0.03, stops:[0,100] } },
    dataLabels: { enabled:false },
    stroke: { curve:'smooth', width:2 },
    xaxis: { categories: finalCats, axisBorder:{show:false}, axisTicks:{show:false}, labels:{ style:{colors:textColor,fontSize:'10px'} } },
    yaxis: { labels:{ style:{colors:textColor,fontSize:'10px',fontFamily:'Geist Mono'}, formatter: v => `Bs ${v}` } },
    grid:  { borderColor:gridColor, strokeDashArray:4, padding:{top:0,right:0,bottom:0,left:10} },
    tooltip: { theme: isDark ? 'dark' : 'light', y:{ formatter: v => `Bs ${v}` } },
    theme: { mode: isDark ? 'dark' : 'light' },
  });
  State._mrrChart.render();
}

async function formNuevoGasto() {
  const { value, isConfirmed } = await Swal.fire({
    title: 'Registrar egreso',
    html: `
      <div style="text-align:left;display:flex;flex-direction:column;gap:14px;margin-top:8px;">
        <div><label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;">Concepto *</label>
          <input id="gs-concepto" class="swal2-input" style="margin:0;width:100%;box-sizing:border-box;" placeholder="Ej. Servidor Render, dominio, etc."></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;">Monto (Bs) *</label>
            <input id="gs-monto" type="number" class="swal2-input" style="margin:0;width:100%;box-sizing:border-box;" placeholder="0.00" min="0" step="0.01"></div>
          <div><label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;">Fecha *</label>
            <input id="gs-fecha" type="date" class="swal2-input" style="margin:0;width:100%;box-sizing:border-box;" value="${new Date().toISOString().slice(0,10)}"></div>
        </div>
        <div><label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;">Referencia / Comprobante</label>
          <input id="gs-ref" class="swal2-input" style="margin:0;width:100%;box-sizing:border-box;" placeholder="Nro. factura o referencia (opcional)"></div>
      </div>`,
    showCancelButton: true, confirmButtonText: 'Registrar egreso', cancelButtonText: 'Cancelar',
    confirmButtonColor: '#c12425', focusConfirm: false,
    preConfirm: () => {
      const concepto = document.getElementById('gs-concepto').value.trim();
      const monto    = parseFloat(document.getElementById('gs-monto').value);
      const fecha    = document.getElementById('gs-fecha').value;
      if (!concepto)         { Swal.showValidationMessage('El concepto es obligatorio'); return false; }

  try {
    await apiFetch('/superadmin/gastos', { method:'POST', body:JSON.stringify(value) });
    toast('Egreso registrado correctamente', 'ok');
    cargarFinanzas();
  } catch (err) { mostrarError(err.message); }

async function cargarHardware() {
  document.getElementById('content').innerHTML = skeletonHardware();
  try {
    const relojes = await apiFetch('/superadmin/hardware');
    State._hwData = relojes;
    renderHardware(relojes);
  } catch (err) {
    document.getElementById('content').innerHTML = errorView('Hardware','microchip',err.message,'cargarHardware()');
    return;
  }
  if (State._hwInterval) clearInterval(State._hwInterval);
  State._hwInterval = setInterval(async () => {
    if (State.vista !== 'hardware') { clearInterval(State._hwInterval); State._hwInterval = null; return; }
    try {
      const relojes = await apiFetch('/superadmin/hardware');
      State._hwData = relojes;
      if (!document.getElementById('hw-ts')) return;
      actualizarHWEnSilencio(relojes);
    } catch { /* silencioso en auto-refresh */ }
  }, 30000);
}

function filasHardware(lista) {
  if (!lista.length) return `<tr><td colspan="5">
    <div class="flex flex-col items-center justify-center py-14 gap-3 text-slate-400">
      <i class="fas fa-microchip text-3xl opacity-30"></i>
      <p class="text-sm font-medium text-slate-500">Sin dispositivos registrados</p>
    </div>
  </td></tr>`;

  return lista.map(r => {
    const pct     = r.uso_porcentaje || 0;
    const usoFill = pct > 90 ? 'full' : pct > 70 ? 'warn' : '';
    const dotCls  = r.esta_online ? 'dot-ok dot-pulse' : (r.minutos_offline >= 999999 ? 'dot-warn' : 'dot-err');

function actualizarHWEnSilencio(relojes) {
  const online  = relojes.filter(r => r.esta_online).length;

  if (tbody) tbody.innerHTML = filasHardware(relojes);
}

function filtrarHW(q) {
  if (!State._hwData) return;
  const txt  = (q||'').toLowerCase().trim();
  const lista = txt
    ? State._hwData.filter(r =>
        (r.numero_serie||'').toLowerCase().includes(txt) ||
        (r.empresa_nombre||'').toLowerCase().includes(txt) ||
        (r.marca_modelo||'').toLowerCase().includes(txt))
    : State._hwData;
  const tbody = document.getElementById('tbody-hw');
  if (tbody) tbody.innerHTML = filasHardware(lista);
}

async function enviarComando(sn, comando) {
  const DESC = {
    REINICIAR:          'reiniciar el dispositivo',
    BORRAR_ASISTENCIAS: 'borrar el log de asistencias',
    BORRAR_TODO:        'borrar TODOS los datos del dispositivo',
  };
  const conf = await pedirConfirmacion(
    '¿Enviar comando?',
    `Se va a ${DESC[comando]||comando} en el reloj ${sn}.`,
    'Sí, enviar'
  );
  if (!conf.isConfirmed) return;
  try {
    const res = await apiFetch(`/superadmin/hardware/${sn}/comando`, {
      method:'POST', body:JSON.stringify({ comando }),
    });
    toast(res.mensaje || 'Comando encolado correctamente', 'ok');
  } catch (err) { mostrarError(err.message); }
}

async function propagarFeriado() {
  const desc  = document.getElementById('fer-desc')?.value.trim();
  const fecha = document.getElementById('fer-fecha')?.value;
  if (!desc)  { toast('Ingrese el nombre del feriado', 'warn'); return; }
  if (!fecha) { toast('Seleccione una fecha', 'warn'); return; }

  const conf = await pedirConfirmacion(
    '¿Propagar feriado?',
    `"${desc}" (${fecha}) se inyectará en todas las empresas activas de la red.`,
    'Sí, propagar'
  );
  if (!conf.isConfirmed) return;

  try {
    const res = await apiFetch('/superadmin/feriados-globales', {
      method: 'POST',
      body: JSON.stringify({ fecha, descripcion: desc }),
    });
    toast(res.mensaje || 'Feriado propagado a todas las empresas', 'ok');

    const hist  = document.getElementById('fer-historial');
    const empty = hist?.querySelector('.text-slate-400');
    if (empty) hist.innerHTML = '';
    if (hist) {
      const item = document.createElement('div');
      item.className = 'flex items-center justify-between px-5 py-3.5';
      item.innerHTML = `
        <div>
          <p class="text-sm font-semibold text-slate-900 dark:text-white">${esc(desc)}</p>
          <p class="text-[11px] text-slate-400 mt-0.5 font-mono">${fecha}</p>
        </div>
        <span class="inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-wide text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/20 px-2.5 py-1 rounded-full">
          <i class="fas fa-check text-[9px]"></i> Propagado
        </span>`;
      hist.prepend(item);
    }

    document.getElementById('fer-desc').value  = '';
    document.getElementById('fer-fecha').value = new Date().toISOString().slice(0, 10);
  } catch (err) {
    mostrarError(err.message);
  }
}

function filasAuditoria(lista) {
  if (!lista || !lista.length) {
    return `<tr><td colspan="4" class="px-5 py-16 text-center">
      <i class="fas fa-shield-halved text-4xl text-slate-300 dark:text-slate-700 mb-3 block"></i>
      <p class="text-sm text-slate-400">Registro inmutable vacío</p>
    </td></tr>`;
  }
  const BADGE = {
    INFO:     'text-sky-700 dark:text-sky-300 bg-sky-50 dark:bg-sky-900/30 border border-sky-200 dark:border-sky-700',
    WARNING:  'text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-700',
    CRITICAL: 'text-red-700 dark:text-red-300 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700',
  };
  return lista.map((l, i) => `
    <tr class="${i % 2 ? 'bg-slate-50/60 dark:bg-dark-700/30' : ''} hover:bg-brand-blue/5 dark:hover:bg-brand-blue/10 transition-colors">
      <td class="px-5 py-3 whitespace-nowrap">
        <span class="inline-block text-[10px] font-bold px-2 py-0.5 rounded-md ${BADGE[l.nivel] || 'text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-dark-700 border border-slate-200 dark:border-dark-border'}">${esc(l.nivel || '—')}</span>
      </td>
      <td class="px-5 py-3 font-mono text-[11px] text-slate-500 dark:text-slate-400 whitespace-nowrap" title="${esc(String(l.fecha||'').slice(0,19))}">${fmtFecha(l.fecha)}</td>
      <td class="px-5 py-3 text-[12px] font-semibold text-slate-700 dark:text-slate-300 whitespace-nowrap">
        ${esc(l.usuario || '—')}
        ${(l.usuario && State.userData?.email && l.usuario.toLowerCase() === State.userData.email.toLowerCase())
          ? `<span class="ml-1.5 text-[9px] font-bold text-brand-blue bg-brand-blue/10 border border-brand-blue/20 px-1.5 py-0.5 rounded-full uppercase tracking-wide">tú</span>`
          : ''}
      </td>
      <td class="px-5 py-3 font-mono text-[12px] text-slate-600 dark:text-slate-300 max-w-[400px] break-words leading-relaxed">${esc(l.accion || '—')}</td>
    </tr>`).join('');
}

function _poblarFiltroOperadores(logs) {
  const sel = document.getElementById('filtro-operador');
  if (!sel) return;
  const prev = sel.value;
  const ops = [...new Set(logs.map(l => l.usuario).filter(Boolean))].sort();

const TAG_PALETTE = [
  'bg-amber-100 text-amber-700 border-amber-300 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-700',
  'bg-sky-100 text-sky-700 border-sky-300 dark:bg-sky-900/30 dark:text-sky-400 dark:border-sky-700',
  'bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-700',
  'bg-violet-100 text-violet-700 border-violet-300 dark:bg-violet-900/30 dark:text-violet-400 dark:border-violet-700',
  'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-700',
  'bg-orange-100 text-orange-700 border-orange-300 dark:bg-orange-900/30 dark:text-orange-400 dark:border-orange-700',
];
function hashTag(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function renderTags(tags) {
  return (tags || []).map(t => {
    const cls = TAG_PALETTE[hashTag(t) % TAG_PALETTE.length];
    return `<span class="inline-block text-[9px] font-bold border rounded-full px-2 py-0.5 uppercase tracking-wide ${cls}">${esc(t)}</span>`;
  }).join(' ');
}
function renderTagsEditor(tags, empId) {
  if (!tags.length) return `<span class="text-[10px] text-slate-400 italic">Sin etiquetas</span>`;
  return tags.map(t => {
    const cls = TAG_PALETTE[hashTag(t) % TAG_PALETTE.length];
    return `<span class="inline-flex items-center gap-1 text-[10px] font-bold border rounded-full px-2 py-0.5 uppercase tracking-wide ${cls}">
      ${esc(t)}
      <button type="button" onclick="removeTag(${JSON.stringify(t)},${empId})"
              class="leading-none hover:opacity-60 transition-opacity ml-0.5">×</button>
    </span>`;
  }).join(' ');
}

let _tagsActuales = [];

function addTag(empId) {
  const inp = document.getElementById(`tag-inp-${empId}`);
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  if (_tagsActuales.includes(val)) { toast('Esa etiqueta ya existe', 'warn'); return; }
  if (_tagsActuales.length >= 10)  { mostrarError('Máximo 10 etiquetas por empresa'); return; }
  _tagsActuales.push(val);
  inp.value = '';
  refrescarTagsUI(empId);
}
function removeTag(tag, empId) {
  _tagsActuales = _tagsActuales.filter(t => t !== tag);
  refrescarTagsUI(empId);
}
function refrescarTagsUI(empId) {
  const cont = document.getElementById(`tags-chips-${empId}`);
  if (cont) cont.innerHTML = renderTagsEditor(_tagsActuales, empId);
}
async function guardarTagsEmpresa(empId) {

/* ═══════════════════════════════════════════════════
   MEJORA 6 — Badge de sesión en sidebar
═══════════════════════════════════════════════════ */
function decodeJWT(token) {
  try {
    const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(atob(b64));
  } catch { return null; }
}
function tiempoSesion(iat) {
  const mins = Math.floor((Date.now() / 1000 - iat) / 60);
  if (mins < 1)  return 'Ahora mismo';
  if (mins < 60) return `${mins}min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m > 0 ? `${h}h ${m}min` : `${h}h`;
}
function actualizarBadgeSesion() {
  const payload = decodeJWT(State.token);
  if (!payload?.iat) return;
  const badge = document.getElementById('sb-session-badge');
  if (badge) badge.textContent = `Activo · ${tiempoSesion(payload.iat)}`;
}

function theadEmpresas() {
  const cols = [
    { col: 'nombre',            label: 'Empresa' },
    { col: 'plan_nombre',       label: 'Plan / Empleados' },
    { col: 'tipo_suscripcion',  label: 'Suscripción' },
    { col: 'estado_suscripcion',label: 'Estado' },
  ];
  const ths = cols.map(({ col, label }) => {
    const isActive = State._sortCol === col;
    const icon = isActive ? (State._sortDir === 'asc' ? 'fa-arrow-up' : 'fa-arrow-down') : 'fa-arrows-up-down';
    const iconColor = isActive ? 'text-brand-blue' : 'text-slate-300 dark:text-slate-600 group-hover:text-slate-500';
    return `<th class="px-5 py-3 font-semibold cursor-pointer select-none group hover:text-slate-800 dark:hover:text-slate-200 transition-colors"
                data-col="${col}" onclick="sortEmpresasPor('${col}')">
      <div class="flex items-center gap-1.5">
        ${label}
        <i class="fas ${icon} text-[9px] ${iconColor} th-sort-icon transition-colors"></i>
      </div>
    </th>`;
  }).join('');
  return ths + `<th class="px-5 py-3 font-semibold text-right">Acciones</th>`;
}

function sortEmpresasPor(col) {
  if (State._sortCol === col) {
    State._sortDir = State._sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    State._sortCol = col;
    State._sortDir = 'asc';
  }
  /* Actualizar iconos sin re-renderizar toda la tabla */
  document.querySelectorAll('.th-sort-icon').forEach(el => {
    const thCol = el.closest('th')?.dataset?.col;
    if (!thCol) return;
    if (thCol === col) {
      el.className = `fas ${State._sortDir === 'asc' ? 'fa-arrow-up' : 'fa-arrow-down'} text-[9px] text-brand-blue th-sort-icon transition-colors`;
    } else {
      el.className = 'fas fa-arrows-up-down text-[9px] text-slate-300 dark:text-slate-600 group-hover:text-slate-500 th-sort-icon transition-colors';
    }
  });
  aplicarFiltrosEmp();
}

function sortedEmpresas(lista) {
  const { _sortCol: col, _sortDir: dir } = State;
  return [...lista].sort((a, b) => {
    let va = a[col] ?? '';
    let vb = b[col] ?? '';
    if (col === 'fecha_vencimiento') {
      va = va ? new Date(va).getTime() : 0;
      vb = vb ? new Date(vb).getTime() : 0;
    } else {
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
    }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ?  1 : -1;
    return 0;
  });
}

  { label:'Empresas',         icon:'fa-building',       action:() => cambiarVista('empresas',         document.querySelector('[data-vista=empresas]'))        },
  { label:'Hardware',         icon:'fa-microchip',      action:() => cambiarVista('hardware',         document.querySelector('[data-vista=hardware]'))        },
  { label:'Finanzas',         icon:'fa-coins',          action:() => cambiarVista('finanzas',         document.querySelector('[data-vista=finanzas]'))        },
  { label:'Feriados Globales',icon:'fa-calendar-days',  action:() => cambiarVista('feriados',         document.querySelector('[data-vista=feriados]'))        },
  { label:'Auditoría',        icon:'fa-shield-halved',  action:() => cambiarVista('auditoria',        document.querySelector('[data-vista=auditoria]'))       },
  { label:'Configuraciones',  icon:'fa-gear',           action:() => cambiarVista('configuraciones',  document.querySelector('[data-vista=configuraciones]')) },
];
let _kbIdx = -1;

function abrirKB() {
  const ov = document.getElementById('kbOverlay');
  ov.classList.add('kb-open');
  const inp = document.getElementById('kbInput');
  inp.value = '';
  filtrarKB('');
  setTimeout(() => inp.focus(), 30);
}
function cerrarKB(e) {
  if (!e || e.target === document.getElementById('kbOverlay')) {
    document.getElementById('kbOverlay').classList.remove('kb-open');
  }
}
function filtrarKB(q) {
  _kbIdx = -1;
  const lq = (q || '').toLowerCase().trim();
  const empresasHits = (State.empresas || [])
    .filter(e => e.nombre.toLowerCase().includes(lq) || (e.nit||'').includes(lq))
    .slice(0, 5)
    .map(e => ({
      label: e.nombre,
      sub:   e.estado_suscripcion || '',
      icon:  'fa-building',
      action:() => { cerrarKB(); abrirGestorEmpresa(e.id); }
    }));
  const menuHits = KB_MENU.filter(m => !lq || m.label.toLowerCase().includes(lq));
  const todos = [...empresasHits, ...menuHits];
  const ul = document.getElementById('kbResults');
  ul._items = todos;
  if (!todos.length) {
    ul.innerHTML = `<li class="px-4 py-6 text-center text-sm text-slate-400">Sin resultados para "${esc(q)}"</li>`;
    return;
  }
  ul.innerHTML = todos.map((item, i) => `
    <li class="flex items-center gap-3 px-4 py-2.5 cursor-pointer text-sm text-slate-700 dark:text-slate-300 hover:bg-brand-blue/5 dark:hover:bg-brand-blue/10 transition-colors"
        onmouseenter="kbHover(${i})" onclick="kbSelect(${i})">
      <i class="fas ${item.icon} w-4 text-center text-slate-400 text-xs shrink-0"></i>
      <span class="flex-1 truncate">${esc(item.label)}</span>
      ${item.sub ? `<span class="text-[10px] text-slate-400 shrink-0">${esc(item.sub)}</span>` : ''}
    </li>`).join('');
}
function kbHover(i) { _kbIdx = i; kbHighlight(); }
function kbHighlight() {
  document.querySelectorAll('#kbResults li').forEach((li, i) =>
    li.classList.toggle('kb-active', i === _kbIdx));
}
function kbSelect(i) {
  const items = document.getElementById('kbResults')._items || [];
  if (items[i]) { cerrarKB(); items[i].action(); }
}
document.addEventListener('keydown', e => {
  const kb   = document.getElementById('kbOverlay');
  const open = kb?.classList.contains('kb-open');
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    open ? cerrarKB() : abrirKB();
    return;
  }
  if (!open) return;
  const items = document.getElementById('kbResults')?._items || [];
  if (e.key === 'ArrowDown') { _kbIdx = Math.min(_kbIdx + 1, items.length - 1); kbHighlight(); e.preventDefault(); }
  if (e.key === 'ArrowUp')   { _kbIdx = Math.max(_kbIdx - 1, 0);                kbHighlight(); e.preventDefault(); }
  if (e.key === 'Enter')     { kbSelect(_kbIdx); }
  if (e.key === 'Escape')    { cerrarKB(); }
});

let _cfgFotoBase64    = null;
let _cfgFotoChanged   = false;
let _cfgValoresOrig   = {};

const _CFG_CAMPOS = ['cfg-nombre','cfg-apellido','cfg-ci','cfg-celular','cfg-pais','cfg-ciudad','cfg-correo-contacto'];

function _habilitarEdicionPerfil() {
  // Guardar valores originales para poder cancelar
  _cfgValoresOrig = {};
  _CFG_CAMPOS.forEach(id => {
    const el = document.getElementById(id);
    if (el) { _cfgValoresOrig[id] = el.value; }
  });
  // Activar campos
  document.querySelectorAll('.cfg-field').forEach(el => {
    el.removeAttribute('readonly');
    el.classList.remove('bg-transparent', 'border-transparent', 'cursor-default');
  });
  // Botón cámara y link foto visibles
  document.getElementById('cfg-btn-foto')?.classList.remove('hidden');
  document.getElementById('cfg-link-foto')?.classList.remove('hidden');
  // Toggle botones
  document.getElementById('cfg-btn-editar')?.classList.add('hidden');
  document.getElementById('cfg-btns-guardar')?.classList.remove('hidden');
}

function _cancelarEdicionPerfil() {
  // Restaurar valores originales
  _CFG_CAMPOS.forEach(id => {
    const el = document.getElementById(id);
    if (el && _cfgValoresOrig[id] !== undefined) el.value = _cfgValoresOrig[id];
  });
  _cfgFotoChanged = false;
  _cfgFotoBase64  = null;
  // Volver a solo lectura
  document.querySelectorAll('.cfg-field').forEach(el => {
    el.setAttribute('readonly', '');
    el.classList.add('bg-transparent', 'border-transparent', 'cursor-default');
  });
  document.getElementById('cfg-btn-foto')?.classList.add('hidden');
  document.getElementById('cfg-link-foto')?.classList.add('hidden');
  document.getElementById('cfg-btn-editar')?.classList.remove('hidden');
  document.getElementById('cfg-btns-guardar')?.classList.add('hidden');
}

function _seleccionarFotoPerfil() { document.getElementById('cfg-foto-input')?.click(); }

async function _procesarFotoPerfil(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = await _redimensionarImagen(e.target.result, 320, 0.88);
    _cfgFotoBase64  = b64;
    _cfgFotoChanged = true;
    const av = document.getElementById('cfg-avatar');
    if (av) av.innerHTML = `<img src="${b64}" class="w-full h-full object-cover" alt="Foto">`;
  };
  reader.readAsDataURL(file);
}

async function guardarPerfil() {
  const nombre   = (document.getElementById('cfg-nombre')?.value || '').trim();
  const apellido = (document.getElementById('cfg-apellido')?.value || '').trim();
  if (!nombre) { mostrarError('El nombre no puede estar vacío.'); return; }

  const payload = {
    nombre,
    apellido:        apellido || null,
    ci:              document.getElementById('cfg-ci')?.value.trim()              || null,
    celular:         document.getElementById('cfg-celular')?.value.trim()         || null,
    pais:            document.getElementById('cfg-pais')?.value.trim()            || 'Bolivia',
    ciudad:          document.getElementById('cfg-ciudad')?.value.trim()          || null,
    correo_contacto: document.getElementById('cfg-correo-contacto')?.value.trim() || null,
  };
  if (_cfgFotoChanged) payload.foto_base64 = _cfgFotoBase64 ?? '';

  try {
    await apiFetch('/superadmin/perfil', { method: 'PUT', body: JSON.stringify(payload) });
    if (State.userData) { State.userData.nombre = nombre; State.userData.apellido = apellido; }
    localStorage.setItem('userData', JSON.stringify(State.userData));
    _actualizarSidebarPerfil(nombre, apellido, State.userData.rol);
    _cfgFotoChanged = false;
    _cancelarEdicionPerfil();   // vuelve a modo solo lectura
    mostrarExito('Perfil actualizado correctamente.');
  } catch (e) { mostrarError(e.message); }
}

async function cambiarPasswordAdmin() {
  const actual    = document.getElementById('cfg-pwd-actual')?.value    || '';
  const nueva     = document.getElementById('cfg-pwd-nueva')?.value     || '';
  const confirmar = document.getElementById('cfg-pwd-confirmar')?.value || '';
  if (!actual || !nueva) { mostrarError('Complete todos los campos de contraseña.'); return; }
  if (nueva !== confirmar) { mostrarError('La nueva contraseña y la confirmación no coinciden.'); return; }
  if (nueva.length < 8)   { mostrarError('La nueva contraseña debe tener al menos 8 caracteres.'); return; }
  const conf = await pedirConfirmacion(
    '¿Cambiar contraseña?',
    'Deberá iniciar sesión nuevamente con la nueva contraseña.',
    'Sí, cambiar'
  );
  if (!conf.isConfirmed) return;
  try {
    await apiFetch('/superadmin/cambiar-password', {
      method: 'PUT', body: JSON.stringify({ actual, nueva }),
    });
    mostrarExito('Contraseña actualizada. Cerrando sesión…');
    setTimeout(cerrarSesion, 2000);
  } catch (e) { mostrarError(e.message); }
}

async function guardarConfigSaaS() {
  const payload = {
    smtp_host:        (document.getElementById('cfg-smtp-host')?.value        || '').trim(),
    smtp_port:        parseInt(document.getElementById('cfg-smtp-port')?.value || '587'),
    smtp_usuario:     (document.getElementById('cfg-smtp-user')?.value         || '').trim(),
    smtp_password:    document.getElementById('cfg-smtp-pass')?.value          || '',
    smtp_from_email:  (document.getElementById('cfg-smtp-from-email')?.value   || '').trim(),
    smtp_from_nombre: (document.getElementById('cfg-smtp-from-nombre')?.value  || '').trim(),
    telefono:         (document.getElementById('cfg-telefono')?.value          || '').trim(),
    whatsapp:         (document.getElementById('cfg-whatsapp')?.value          || '').trim(),
  };
  try {
    await apiFetch('/superadmin/configuracion', { method: 'PUT', body: JSON.stringify(payload) });
    mostrarExito('Configuración guardada correctamente.');
    cargarConfiguraciones();   // Refresca para reflejar smtp_password_set actualizado
  } catch (e) { mostrarError(e.message); }
}

async function testearEmailConfig() {
  const { value: dest } = await Swal.fire({
    title: 'Probar email',
    input: 'email',
    inputLabel: 'Dirección de destino para la prueba',
    inputValue: State.userData?.email || '',
    inputPlaceholder: 'correo@ejemplo.com',
    showCancelButton: true,
    confirmButtonText: 'Enviar',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#0c5078',
  });
  if (!dest) return;
  try {
    const res = await apiFetch('/superadmin/configuracion/test-email', {
      method: 'POST', body: JSON.stringify({ destinatario: dest }),
    });
    mostrarExito(res.mensaje || 'Email enviado correctamente.');
  } catch (e) { mostrarError(e.message); }
}

async function _cargarMiniaturas(rows) {

        const img = document.querySelector(`img[data-admin-id="${a.id}"]`);
        if (img) img.src = res.foto_base64;
      }
    } catch {}
  }));
}

            <p class="font-medium text-slate-700 dark:text-slate-300">Foto de perfil</p>
            <p>JPG o PNG · máximo 500 KB</p>
            <button type="button" onclick="_seleccionarFotoAdmin()"
                    class="text-brand-blue hover:underline">Elegir imagen…</button>
            ${admin && admin.tiene_foto ? `<button type="button" onclick="_borrarFotoAdmin()" class="ml-3 text-red-500 hover:underline">Quitar foto</button>` : ''}
          </div>
          <input type="file" id="foto-input" accept="image/*" class="hidden" onchange="_procesarFotoAdmin(this.files[0])">
        </div>
        <!-- Campos -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          ${_campoAdmin('adm-nombre',          'Nombre',                     admin?.nombre          || '', true)}
          ${_campoAdmin('adm-apellido',         'Apellido',                   admin?.apellido         || '', true)}
          ${_campoAdmin('adm-ci',               'Carnet de Identidad',        admin?.ci               || '', true)}
          ${_campoAdmin('adm-celular',           'Celular',                    admin?.celular          || '', true)}
          ${_campoAdmin('adm-pais',              'País',                       admin?.pais             || 'Bolivia', true)}
          ${_campoAdmin('adm-ciudad',            'Ciudad',                     admin?.ciudad           || '', true)}
          ${_campoAdmin('adm-correo-contacto',   'Correo de contacto',         admin?.correo_contacto  || '', true, 'email')}
          ${_campoAdmin('adm-email',             'Correo de inicio de sesión', admin?.email            || '', true,  'email')}
          ${esNuevo ? `
          <div>
            <label class="text-xs font-medium text-slate-600 dark:text-slate-300 mb-1 block">Contraseña <span class="text-red-500">*</span></label>
            <input id="adm-password" type="password" placeholder="Mínimo 8 caracteres"
                   class="w-full px-3 py-2 text-sm rounded-lg border border-light-border dark:border-dark-border bg-white dark:bg-dark-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-blue/30">
          </div>` : ''}
        </div>
      </div>
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-light-border dark:border-dark-border sticky bottom-0 bg-white dark:bg-dark-800">
        <button onclick="cerrarModalAdmin()"
                class="px-4 py-2 text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-dark-700 rounded-lg transition-colors">
          Cancelar
        </button>
        <button onclick="guardarAdmin()"
                class="px-5 py-2 text-sm font-medium bg-brand-blue text-white rounded-lg hover:bg-brand-blue/90 transition-colors">
          ${esNuevo ? 'Crear administrador' : 'Guardar cambios'}
        </button>
      </div>
    </div>
  `;
  modalEl.classList.remove('hidden');

  if (admin && admin.tiene_foto) {
    apiFetch(`/superadmin/administradores/${admin.id}/foto`)
      .then(r => { if (r.foto_base64) { _adminFoto = r.foto_base64; _mostrarPreviewFoto(r.foto_base64); } })
      .catch(() => {});
  }
}

function _campoAdmin(id, label, val, required = false, type = 'text') {
  return `<div>
    <label class="text-xs font-medium text-slate-600 dark:text-slate-300 mb-1 block">${label}${required ? ' <span class="text-red-500">*</span>' : ''}</label>
    <input id="${id}" type="${type}" value="${esc(val)}"
           class="w-full px-3 py-2 text-sm rounded-lg border border-light-border dark:border-dark-border bg-white dark:bg-dark-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-blue/30">
  </div>`;
}

function cerrarModalAdmin() {
  const m = document.getElementById('modal-admin');
  if (m) m.classList.add('hidden');
  _adminFoto = null; _adminFotoChanged = false; _adminEditId = null;
}

function _seleccionarFotoAdmin() { document.getElementById('foto-input')?.click(); }

function _borrarFotoAdmin() {
  _adminFoto = ''; _adminFotoChanged = true;
  const p = document.getElementById('foto-preview');
  if (p) p.innerHTML = '<i class="fas fa-user text-brand-blue text-2xl"></i>';
}

function _mostrarPreviewFoto(b64) {
  const p = document.getElementById('foto-preview');
  if (p) p.innerHTML = `<img src="${b64}" class="w-full h-full object-cover" alt="Foto">`;
}

async function _procesarFotoAdmin(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = await _redimensionarImagen(e.target.result, 320, 0.88);
    _adminFoto = b64; _adminFotoChanged = true;
    _mostrarPreviewFoto(b64);
  };
  reader.readAsDataURL(file);
}

function _redimensionarImagen(b64, max, q) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else        { w = Math.round(w * max / h); h = max; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', q));
    };
    img.onerror = () => resolve(b64);
    img.src = b64;
  });
}

async function guardarAdmin() {
  const nombre          = document.getElementById('adm-nombre')?.value.trim();
  const apellido        = document.getElementById('adm-apellido')?.value.trim();
  const ci              = document.getElementById('adm-ci')?.value.trim();
  const celular         = document.getElementById('adm-celular')?.value.trim();
  const pais            = document.getElementById('adm-pais')?.value.trim();
  const ciudad          = document.getElementById('adm-ciudad')?.value.trim();
  const correo_contacto = document.getElementById('adm-correo-contacto')?.value.trim();
  const email           = document.getElementById('adm-email')?.value.trim().toLowerCase();
  const esNuevo         = !_adminEditId;

  if (!nombre || !apellido || !ci || !celular || !pais || !ciudad || !correo_contacto || !email) {
    mostrarError('Todos los campos marcados con * son obligatorios.'); return;
  }

  const payload = {
    nombre, apellido, ci, celular, pais, ciudad, correo_contacto, email,
  };

  if (esNuevo) {
    const pwd = document.getElementById('adm-password')?.value;
    if (!pwd || pwd.length < 8) { mostrarError('La contraseña debe tener al menos 8 caracteres.'); return; }
    payload.password = pwd;
    if (_adminFotoChanged && _adminFoto) payload.foto_base64 = _adminFoto;
  } else {
    if (_adminFotoChanged) payload.foto_base64 = _adminFoto ?? '';
  }

  try {
    if (esNuevo) {
      await apiFetch('/superadmin/administradores', { method: 'POST', body: JSON.stringify(payload) });
      mostrarExito('Administrador creado correctamente.');
    } else {
      await apiFetch(`/superadmin/administradores/${_adminEditId}`, { method: 'PUT', body: JSON.stringify(payload) });
      mostrarExito('Administrador actualizado correctamente.');
    }
    cerrarModalAdmin();
    cargarAdministradores();
  } catch (e) { mostrarError(e.message); }
}

async function resetPasswordAdmin(id, nombre) {
  const { value: pwd } = await Swal.fire({
    title: 'Resetear contraseña',
    html: `<p class="text-sm text-slate-500 mb-2">Administrador: <strong>${esc(nombre)}</strong></p>`,
    input: 'password',
    inputLabel: 'Nueva contraseña (mínimo 8 caracteres)',
    inputAttributes: { minlength: 8, autocomplete: 'new-password' },
    showCancelButton: true,
    confirmButtonText: 'Resetear',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#d97706',
    preConfirm: v => { if (!v || v.length < 8) { Swal.showValidationMessage('Mínimo 8 caracteres'); return false; } return v; },
  });
  if (!pwd) return;
  try {
    await apiFetch(`/superadmin/administradores/${id}/reset-password`, {
      method: 'PUT', body: JSON.stringify({ nueva_password: pwd }),
    });
    mostrarExito('Contraseña reseteada correctamente.');
  } catch (e) { mostrarError(e.message); }
}

async function eliminarAdmin(id, nombre) {
  const ok = await pedirConfirmacion(
    `¿Eliminar al administrador <strong>${esc(nombre)}</strong>?`,
    'Esta acción no se puede deshacer. El usuario perderá acceso inmediatamente.'
  );
  if (!ok) return;
  try {
    await apiFetch(`/superadmin/administradores/${id}`, { method: 'DELETE' });
    mostrarExito('Administrador eliminado.');
    cargarAdministradores();
  } catch (e) { mostrarError(e.message); }
}

   FIN ADMINISTRADORES
═══════════════════════════════════════════════════ */

async function verificarVencimientosManual() {
  const btn = document.getElementById('btn-verificar-venc');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i> Verificando…'; }
  try {
    const res = await apiFetch('/superadmin/cron/check-vencimientos', { method: 'POST' });
    const r   = res.resultado || {};
    const el  = document.getElementById('cfg-cron-resultado');
    if (el) {
      el.classList.remove('hidden');
      const errHtml = r.errores?.length
        ? `<br><span class="text-brand-red">Errores: ${esc(r.errores.join(' | '))}</span>`
        : '';
      el.innerHTML =
        `Empresas revisadas: <strong>${r.procesadas ?? 0}</strong> &nbsp;·&nbsp; ` +
        `Notificaciones creadas: <strong>${r.notificaciones_nuevas ?? 0}</strong> &nbsp;·&nbsp; ` +
        `Emails enviados: <strong>${r.emails_enviados ?? 0}</strong>${errHtml}`;
    }
    toast('Verificación completada', 'ok');
  } catch (e) { mostrarError(e.message); }
  finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-bell-ring text-brand-blue text-xs"></i> Verificar vencimientos ahora';
    }
  }
}
