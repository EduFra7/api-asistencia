<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin - Centro de Comando SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 font-sans flex h-screen overflow-hidden text-slate-800 relative">

    <div id="mobileOverlay" class="fixed inset-0 bg-slate-900 bg-opacity-50 z-20 hidden md:hidden transition-opacity" onclick="toggleMenu()"></div>

    <div id="drawerOverlay" class="fixed inset-0 bg-slate-900 bg-opacity-40 z-40 hidden transition-opacity opacity-0 backdrop-blur-sm" onclick="cerrarDrawer()"></div>
    <div id="drawerEmpresa" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col border-l border-slate-200">
        <div class="p-6 border-b border-slate-100 bg-white flex justify-between items-center shadow-sm z-10">
            <div>
                <h3 class="text-xl font-black text-slate-800" id="drawer_nombre">Empresa</h3>
                <p class="text-xs text-slate-500 font-mono mt-1" id="drawer_nit">NIT / DB</p>
            </div>
            <button onclick="cerrarDrawer()" class="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-full w-8 h-8 flex items-center justify-center transition-colors"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 bg-slate-50/50 space-y-6" id="drawer_body">
            </div>
    </div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-blue-400"><i class="fas fa-satellite-dish mr-2"></i>C.A Lector</h2><p class="text-xs text-slate-400 mt-1 tracking-widest uppercase">Centro de Comando</p></div>
            <button onclick="toggleMenu()" class="md:hidden text-slate-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="cambiarVista('resumen', this)" class="menu-btn w-full flex items-center p-3 bg-blue-600 rounded-lg text-white font-medium transition-colors shadow-sm"><i class="fas fa-chart-pie w-6 text-center"></i> Resumen Global</button>
            <button onclick="cambiarVista('empresas', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors"><i class="fas fa-building w-6 text-center"></i> Clientes / Empresas</button>
            <button onclick="cambiarVista('hardware', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors"><i class="fas fa-microchip w-6 text-center"></i> Monitor Hardware</button>
            <button onclick="cambiarVista('feriados', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors"><i class="fas fa-calendar-star w-6 text-center"></i> Feriados Globales</button>
            <button onclick="cambiarVista('auditoria', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors"><i class="fas fa-user-secret w-6 text-center"></i> Caja Negra (Logs)</button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="mb-4 px-3"><p class="text-xs text-slate-400">Sesión Activa:</p><p class="text-sm font-bold text-white truncate" id="userNameDisplay">Cargando...</p></div>
            <button onclick="cerrarSesion()" class="flex items-center justify-center w-full p-3 text-red-400 hover:bg-red-500 hover:text-white border border-red-900 rounded-lg transition-all text-sm font-bold"><i class="fas fa-power-off mr-2"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="bg-white shadow-sm border-b border-slate-200 p-4 flex justify-between items-center md:hidden z-10"><h1 class="text-lg font-bold text-slate-800"><i class="fas fa-satellite-dish text-blue-600 mr-2"></i>C.A Lector</h1><button onclick="toggleMenu()" class="text-slate-600 focus:outline-none text-2xl"><i class="fas fa-bars"></i></button></header>
        <div id="contenedor-dinamico" class="flex-1 overflow-y-auto p-4 md:p-8"><div class="flex items-center justify-center h-full text-slate-400"><i class="fas fa-spinner fa-spin text-4xl"></i></div></div>
    </main>

    <script>
        // =========================================================
        // 1. CONFIGURACIÓN Y SEGURIDAD BASE
        // =========================================================
        const API_URL = "https://asistencia-api.up.railway.app";
        const token = localStorage.getItem('token');
        const userDataStr = localStorage.getItem('userData');

        if (!token || !userDataStr) window.location.href = 'index.html';
        const userData = JSON.parse(userDataStr);
        if (userData.rol !== 'superadmin') window.location.href = 'index.html';

        document.getElementById('userNameDisplay').textContent = userData.nombre;

        function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobileOverlay').classList.toggle('hidden');
        }

        // =========================================================
        // 2. PLANTILLAS DE VISTAS (HTML EN MEMORIA)
        // =========================================================
        const VISTA_RESUMEN = `<div class="mb-6"><h1 class="text-2xl font-bold text-slate-800">Resumen Global SaaS</h1><p class="text-sm text-slate-500">Métricas en tiempo real de toda tu infraestructura.</p></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-l-4 border-l-blue-500"><p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Empresas Activas</p><p class="text-3xl font-bold text-slate-800 mt-2" id="kpi_empresas"><i class="fas fa-circle-notch fa-spin text-sm text-slate-300"></i></p></div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-l-4 border-l-emerald-500"><p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Relojes Online (24h)</p><p class="text-3xl font-bold text-slate-800 mt-2" id="kpi_relojes"><i class="fas fa-circle-notch fa-spin text-sm text-slate-300"></i></p></div>
            </div>`;

        // ⚡ VISTA EMPRESAS LIMPIA (Un solo botón de Gestionar)
        const VISTA_EMPRESAS = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                <div><h1 class="text-2xl font-bold text-slate-800">Directorio de Clientes</h1><p class="text-sm text-slate-500">Selecciona un cliente para abrir su Panel de Control.</p></div>
                <button onclick="abrirModalEmpresa()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md"><i class="fas fa-plus-circle mr-2"></i> Aprovisionar Cliente</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4 flex flex-col md:flex-row gap-4 items-center">
                <div class="relative w-full md:w-1/3"><i class="fas fa-search absolute left-3 top-3 text-slate-400"></i><input type="text" id="filtroBuscador" onkeyup="aplicarFiltros()" placeholder="Buscar por Empresa, NIT, Ciudad..." class="w-full pl-10 pr-4 py-2 border rounded-lg text-sm outline-none"></div>
                <div class="w-full md:w-1/4"><select id="filtroEstado" onchange="aplicarFiltros()" class="w-full px-4 py-2 border rounded-lg text-sm outline-none"><option value="TODOS">Todos los Estados</option><option value="AL_DIA">Al Día</option><option value="VENCIDO">Vencidas</option></select></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col"><div class="overflow-x-auto"><table class="w-full text-left border-collapse min-w-[800px]">
                <thead><tr class="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider border-b"><th class="p-4 font-bold">Empresa / Ciudad</th><th class="p-4 font-bold">Plan y Usuarios</th><th class="p-4 font-bold">Estado</th><th class="p-4 font-bold text-right">Herramientas</th></tr></thead>
                <tbody id="tablaEmpresas" class="text-sm divide-y divide-slate-100"><tr><td colspan="4" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando...</td></tr></tbody>
            </table></div></div>`;

        // ⚡ VISTA_HARDWARE AHORA CON FILTROS DE MODELO Y UBICACIÓN
        const VISTA_HARDWARE = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                <div><h1 class="text-2xl font-bold text-slate-800">Radar IoT (Hardware)</h1><p class="text-sm text-slate-500">Monitor global de activos físicos ZKTeco en tu red.</p></div>
                <button onclick="cargarHardwareAPI()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md"><i class="fas fa-satellite-dish mr-2"></i> Refrescar Red</button>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4 grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                <div class="relative w-full">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="buscHw" onkeyup="pintarHardware()" placeholder="Buscar Serie o Cliente..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:border-blue-500 outline-none">
                </div>
                <div class="relative w-full">
                    <i class="fas fa-microchip absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="filtMod" onkeyup="pintarHardware()" placeholder="Filtrar por Modelo..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:border-blue-500 outline-none">
                </div>
                <div class="relative w-full">
                    <i class="fas fa-map-marker-alt absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="filtUbi" onkeyup="pintarHardware()" placeholder="Filtrar por Ubicación..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:border-blue-500 outline-none">
                </div>
                <div class="w-full">
                    <select id="filtHw" onchange="pintarHardware()" class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:border-blue-500 outline-none">
                        <option value="ALL">Todos los Estados</option>
                        <option value="ON">Solo Conectados</option>
                        <option value="OFF">Desconectados</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col"><div class="overflow-x-auto"><table class="w-full text-left border-collapse min-w-[900px]">
                <thead><tr class="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider border-b"><th class="p-4 font-bold w-1/5">Estado y Señal</th><th class="p-4 font-bold">Hardware (S/N y Modelo)</th><th class="p-4 font-bold">Cliente y Ubicación</th><th class="p-4 font-bold text-right">Comandos Remotos</th></tr></thead>
                <tbody id="tablaHardware" class="text-sm divide-y divide-slate-100"><tr><td colspan="4" class="p-8 text-center text-slate-500"><i class="fas fa-satellite-dish fa-spin mr-2"></i>Rastreando señales...</td></tr></tbody>
            </table></div></div>`;

        // ⚡ NUEVA VISTA: FERIADOS GLOBALES
        const VISTA_FERIADOS = `
            <div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4"><i class="fas fa-bullhorn text-2xl"></i></div>
                    <h1 class="text-2xl font-bold text-slate-800">Cañón de Feriados Globales</h1>
                    <p class="text-sm text-slate-500 mt-2">Propaga un decreto de Feriado Nacional hacia <b>todas</b> las empresas de la red en tiempo real.</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase">Nombre / Motivo del Feriado</label>
                        <input type="text" id="global_motivo" class="mt-1 w-full border rounded-lg p-3 outline-none focus:border-blue-500" placeholder="Ej. Feriado Excepcional por Censo">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase">Fecha Exacta</label>
                        <input type="date" id="global_fecha" class="mt-1 w-full border rounded-lg p-3 outline-none focus:border-blue-500">
                    </div>
                    <button onclick="lanzarFeriadoGlobal()" class="w-full bg-slate-800 hover:bg-black text-white p-3 rounded-lg font-bold shadow-md transition-colors mt-4">
                        <i class="fas fa-rocket mr-2"></i> Inyectar Feriado en la Nube
                    </button>
                    <div class="bg-amber-50 p-4 rounded-lg border border-amber-200 mt-4 flex items-start">
                        <i class="fas fa-exclamation-triangle text-amber-500 mt-0.5 mr-3"></i>
                        <p class="text-xs text-amber-700"><b>Precaución:</b> Esta acción es irreversible. El feriado se guardará en los calendarios de todos tus clientes, anulando las faltas de ese día.</p>
                    </div>
                </div>
            </div>`;
        
        const VISTA_AUDITORIA = `
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-slate-800">Caja Negra (Log de Auditoría)</h1>
                <p class="text-sm text-slate-500">Registro inmutable de seguridad de todas las acciones del equipo SuperAdmin.</p>
            </div>

            <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-700 overflow-hidden flex flex-col">
                <div class="p-4 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
                    <h3 class="text-white font-bold text-sm"><i class="fas fa-terminal text-green-400 mr-2"></i>Terminal de Seguridad del Core</h3>
                    <button onclick="cargarAuditoriaAPI()" class="text-slate-400 hover:text-white transition-colors" title="Refrescar Logs"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-slate-900 text-slate-400 text-[10px] uppercase tracking-wider border-b border-slate-700">
                                <th class="p-4 font-bold">Fecha / Hora</th>
                                <th class="p-4 font-bold">Nivel</th>
                                <th class="p-4 font-bold">Usuario Emisor</th>
                                <th class="p-4 font-bold w-1/2">Acción Registrada en el Sistema</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAuditoria" class="text-sm divide-y divide-slate-800 font-mono text-slate-300">
                            <tr><td colspan="4" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Desencriptando registros...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        // =========================================================
        // 3. MOTOR DE RUTAS
        // =========================================================
        function cambiarVista(vista, botonObj) {
            if(botonObj) {
                document.querySelectorAll('.menu-btn').forEach(btn => btn.className = "menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors");
                botonObj.className = "menu-btn w-full flex items-center p-3 bg-blue-600 rounded-lg text-white font-medium transition-colors shadow-sm";
            }
            const contenedor = document.getElementById('contenedor-dinamico');
            if (vista === 'resumen') { contenedor.innerHTML = VISTA_RESUMEN; cargarKPIsGlobales(); } 
            else if (vista === 'empresas') { contenedor.innerHTML = VISTA_EMPRESAS; cargarEmpresasAPI(); } 
            else if (vista === 'hardware') { contenedor.innerHTML = VISTA_HARDWARE; cargarHardwareAPI(); }
            else if (vista === 'feriados') { contenedor.innerHTML = VISTA_FERIADOS; }
            else if (vista === 'auditoria') { contenedor.innerHTML = VISTA_AUDITORIA; cargarAuditoriaAPI(); } // ⚡ NUEVO
            if(window.innerWidth < 768) toggleMenu();
        }

        // =========================================================
        // 4. MEMORIA Y LÓGICA DE DIBUJADO DE EMPRESAS (Intacta)
        // =========================================================
        window.datosEmpresasGlobal = [];
        window.datosHardwareGlobal = [];
        window.togglePassword = function(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; };

        async function cargarKPIsGlobales() {
            try {
                const res = await fetch(`${API_URL}/superadmin/kpis`, { headers: { 'Authorization': `Bearer ${token}` } });
                const kpis = await res.json();
                document.getElementById('kpi_empresas').textContent = kpis.total_empresas;
                document.getElementById('kpi_relojes').textContent = kpis.relojes_online;
            } catch (e) {}
        }

        async function cargarEmpresasAPI() {
            try {
                const res = await fetch(`${API_URL}/empresas`, { headers: { 'Authorization': `Bearer ${token}` } });
                window.datosEmpresasGlobal = await res.json(); 
                aplicarFiltros(); 
            } catch (error) {}
        }

        function aplicarFiltros() {
            const buscador = document.getElementById('filtroBuscador')?.value.toLowerCase() || '';
            const estado = document.getElementById('filtroEstado')?.value || 'TODOS';
            const tipoSub = document.getElementById('filtroSuscripcion')?.value || 'TODOS';
            const tbody = document.getElementById('tablaEmpresas'); tbody.innerHTML = '';
            let resultados = window.datosEmpresasGlobal.filter(emp => {
                const textoMatch = emp.nombre.toLowerCase().includes(buscador) || (emp.nit && emp.nit.toLowerCase().includes(buscador)) || (emp.ciudad && emp.ciudad.toLowerCase().includes(buscador));
                const subMatch = (tipoSub === 'TODOS') || (emp.tipo_suscripcion === tipoSub);
                let estadoMatch = true;
                if (estado !== 'TODOS') {
                    if (!emp.fecha_vencimiento) { estadoMatch = (estado === 'AL_DIA'); } 
                    else {
                        const diasRestantes = Math.ceil((new Date(emp.fecha_vencimiento) - new Date()) / (1000 * 60 * 60 * 24));
                        if (estado === 'VENCIDO') estadoMatch = diasRestantes < 0;
                        if (estado === 'POR_VENCER') estadoMatch = diasRestantes >= 0 && diasRestantes <= 15;
                        if (estado === 'AL_DIA') estadoMatch = diasRestantes > 15;
                    }
                }
                return textoMatch && subMatch && estadoMatch;
            });

            if (resultados.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No se encontraron clientes.</td></tr>'; return; }

            resultados.forEach(emp => {
                const usoPorcentaje = Math.round((emp.total_empleados / (emp.limite_usuarios || 50)) * 100) || 0;
                const colorUso = usoPorcentaje > 90 ? 'bg-red-500' : (usoPorcentaje > 70 ? 'bg-yellow-500' : 'bg-blue-500');
                let badgeEstado = '<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-[10px] font-bold uppercase">Al Día</span>';
                let fechaVenc = emp.fecha_vencimiento || 'Indefinido';
                if(emp.fecha_vencimiento && emp.fecha_vencimiento !== '2099-12-31') {
                    const diasRestantes = Math.ceil((new Date(emp.fecha_vencimiento) - new Date()) / (1000 * 60 * 60 * 24));
                    if(diasRestantes < 0) badgeEstado = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-[10px] font-bold uppercase">Vencido</span>';
                    else if (diasRestantes <= 15) badgeEstado = `<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-[10px] font-bold uppercase">Vence en ${diasRestantes} d</span>`;
                } else if (emp.fecha_vencimiento === '2099-12-31') { fechaVenc = 'Indefinido (Prueba/Interno)'; }

                const empSeguro = JSON.stringify(emp).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-colors group">
                        <td class="p-4"><div class="flex items-center"><div class="h-10 w-10 rounded-lg bg-slate-800 text-white flex items-center justify-center font-bold mr-3">${emp.nombre.charAt(0).toUpperCase()}</div>
                            <div><p class="font-bold text-slate-800">${emp.nombre}</p><p class="text-[11px] text-slate-500"><i class="fas fa-map-marker-alt text-red-400 mr-1"></i>${emp.ciudad || 'N/A'} | NIT: ${emp.nit || 'N/A'}</p></div></div></td>
                        <td class="p-4"><p class="text-sm font-bold text-slate-700">${emp.plan_nombre || 'Básico'}</p><div class="w-full bg-slate-200 rounded-full h-1.5 mb-1 mt-1 max-w-[150px]"><div class="${colorUso} h-1.5 rounded-full" style="width: ${usoPorcentaje > 100 ? 100 : usoPorcentaje}%"></div></div><p class="text-[10px] text-slate-500">${emp.total_empleados} de ${emp.limite_usuarios} usuarios</p></td>
                        <td class="p-4">${badgeEstado}<p class="text-[11px] text-slate-500 mt-1"><i class="far fa-calendar-alt mr-1"></i>${fechaVenc} (${emp.tipo_suscripcion || 'Mensual'})</p></td>
                        <td class="p-4 text-right"><div class="flex items-center justify-end space-x-1">
                                <button onclick="registrarPago(${emp.id}, '${emp.nombre}')" class="bg-emerald-50 hover:bg-emerald-500 hover:text-white text-emerald-600 p-2 rounded-lg transition-colors" title="Registrar Pago"><i class="fas fa-hand-holding-usd"></i></button>
                                <button onclick="verHistorialPagos(${emp.id}, '${emp.nombre}')" class="bg-slate-100 hover:bg-slate-600 hover:text-white text-slate-600 p-2 rounded-lg transition-colors" title="Historial Contable"><i class="fas fa-file-invoice-dollar"></i></button>
                                <div class="w-px h-6 bg-slate-200 mx-1"></div>
                                <button onclick="abrirModalEdicion(${empSeguro})" class="bg-amber-50 hover:bg-amber-500 hover:text-white text-amber-600 p-2 rounded-lg transition-colors" title="Editar / Reset Pass"><i class="fas fa-edit"></i></button>
                                <button onclick="entrarComoEmpresa(${emp.id})" class="bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 p-2 rounded-lg transition-colors" title="Entrar al Panel"><i class="fas fa-sign-in-alt"></i></button>
                                <button onclick="eliminarEmpresa(${emp.id}, '${emp.nombre}')" class="text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors" title="Destruir Esquema"><i class="fas fa-trash-alt"></i></button>
                            </div></td></tr>`;
            });
        }

        // =========================================================
        // ⚡ EL CEREBRO DEL SLIDE-OVER (DRAWER) ⚡
        // =========================================================
        window.abrirDrawer = function(emp) {

        async function cargarHardwareAPI() {
            try {
                const response = await fetch(`${API_URL}/superadmin/hardware`, { headers: { 'Authorization': `Bearer ${token}` } });
                window.datosHardwareGlobal = await response.json(); 
                pintarHardware();
            } catch (error) { document.getElementById('tablaHardware').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500">Error conectando con la red ADMS.</td></tr>`; }
        }

        function pintarHardware() {
            // 1. Capturamos los 4 filtros de la vista
            const buscador = document.getElementById('buscHw')?.value.toLowerCase() || '';
            const filtMod = document.getElementById('filtMod')?.value.toLowerCase() || '';
            const filtUbi = document.getElementById('filtUbi')?.value.toLowerCase() || '';
            const filtro = document.getElementById('filtHw')?.value || 'ALL';
            
            const tbody = document.getElementById('tablaHardware'); tbody.innerHTML = '';

            // 2. El Frontend Tonto aplica los filtros usando los nombres de las columnas que vinieron del Backend
            let r = window.datosHardwareGlobal.filter(hw => {
                const textoMatch = hw.numero_serie.toLowerCase().includes(buscador) || (hw.empresa_nombre && hw.empresa_nombre.toLowerCase().includes(buscador));
                const modMatch = (hw.marca_modelo || '').toLowerCase().includes(filtMod);
                const ubiMatch = (hw.ubicacion_nombre || '').toLowerCase().includes(filtUbi);
                const filtroMatch = (filtro === 'ALL') || (filtro === 'ON' && hw.esta_online) || (filtro === 'OFF' && !hw.esta_online);
                
                return textoMatch && modMatch && ubiMatch && filtroMatch;
            });

            if (r.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No se encontraron dispositivos con estos filtros.</td></tr>'; return; }

            // 3. Dibujamos la tabla final
            r.forEach(hw => {
                let badgeEstado = '<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-[10px] font-bold uppercase"><i class="fas fa-circle text-[8px] mr-1"></i>Offline</span>';
                
                if (hw.esta_online) {
                    badgeEstado = '<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-[10px] font-bold uppercase"><i class="fas fa-circle text-[8px] mr-1 text-emerald-500 animate-pulse"></i>Conectado</span>';
                } else if (hw.minutos_offline < 60) {
                    badgeEstado = '<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-[10px] font-bold uppercase"><i class="fas fa-circle text-[8px] mr-1 text-amber-500"></i>Perdió Señal</span>';
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4">${badgeEstado}<p class="text-[10px] text-slate-400 mt-1">Ping: ${hw.ultima_conexion_str}</p></td>
                        <td class="p-4">
                            <p class="font-mono font-bold text-slate-800 text-sm"><i class="fas fa-microchip text-slate-400 mr-2"></i>${hw.numero_serie}</p>
                            <p class="text-[11px] text-slate-500 font-medium mt-0.5 ml-6">Mod: ${hw.marca_modelo || 'Desconocido'}</p>
                        </td>
                        <td class="p-4">
                            <p class="font-bold text-slate-700">${hw.empresa_nombre || '<span class="text-red-400">Sin Asignar (Desconectado)</span>'}</p>
                            <p class="text-[11px] text-slate-500 mt-0.5"><i class="fas fa-map-marker-alt text-red-400 mr-1"></i>${hw.ubicacion_nombre || 'Sin Nombre Asignado'}</p>
                            <p class="text-[9px] text-blue-500 font-mono mt-0.5 hidden md:block">DB: ${hw.schema_name}</p>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="enviarComandoRemoto('${hw.numero_serie}')" class="bg-slate-800 hover:bg-slate-700 text-white p-2 px-3 rounded-lg transition-colors font-medium text-xs shadow-sm">
                                <i class="fas fa-terminal mr-1"></i> Consola
                            </button>
                        </td>
                    </tr>`;
            });
        }

        function enviarComandoRemoto(sn) {
            Swal.fire({
                title: `Terminal IoT: ${sn}`, html: `<p class="text-sm text-slate-500 mb-4 text-left">Selecciona orden para el reloj.</p><select id="swal_comando" class="w-full border rounded-lg p-3 text-sm"><option value="REINICIAR">🔄 Reiniciar (Reboot)</option><option value="BORRAR_ASISTENCIAS">🗑️ Borrar Historial de Asistencias</option><option value="BORRAR_TODO">⚠️ Borrar TODO (Usuarios y Huellas) - PELIGROSO</option></select>`,
                showCancelButton: true, confirmButtonText: 'Enviar Comando', confirmButtonColor: '#1e293b'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Transmitiendo...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(`${API_URL}/superadmin/hardware/${sn}/comando`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ comando: document.getElementById('swal_comando').value }) });

        }

        // =========================================================
        // 6. MÓDULO: CAÑÓN DE FERIADOS GLOBALES
        // =========================================================
        async function lanzarFeriadoGlobal() {
            const motivo = document.getElementById('global_motivo').value;
            const fecha = document.getElementById('global_fecha').value;
            
            if(!motivo || !fecha) return Swal.fire('Error', 'Completa el motivo y la fecha', 'warning');

            const confirmacion = await Swal.fire({
                title: '¿Confirmar Lanzamiento Global?',
                html: `Se insertará <b>${motivo}</b> el día <b>${fecha}</b> en todas las empresas activas.`,
                icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, Lanzar Feriado', confirmButtonColor: '#1e293b'
            });

            if (confirmacion.isConfirmed) {
                Swal.fire({ title: 'Inyectando en la Nube...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(`${API_URL}/superadmin/feriados-globales`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                        body: JSON.stringify({ fecha, descripcion: motivo }) 
                    });
                    const data = await res.json();
                    if(!res.ok) throw new Error(data.detail);
                    Swal.fire('¡Propagado!', data.mensaje, 'success');
                    document.getElementById('global_motivo').value = '';
                    document.getElementById('global_fecha').value = '';
                } catch (e) { Swal.fire('Fallo del Sistema', e.message, 'error'); }
            }
        }

                        info: {
                            nombre: document.getElementById('edit_nombre').value,
                            nit: document.getElementById('edit_nit').value,
                            razon_social: document.getElementById('edit_razon').value,
                            ciudad: document.getElementById('edit_ciudad').value,
                            plan_nombre: document.getElementById('edit_plan').value,
                            limite_usuarios: document.getElementById('edit_limite').value,
                            tipo_suscripcion: document.getElementById('edit_tipo_sub').value, // ⚡ Lo capturamos para el backend
                            fecha_vencimiento: document.getElementById('edit_vencimiento').value
                        },
                        credenciales: {
                            admin_nombre: document.getElementById('edit_admin_nombre').value,
                            admin_email: document.getElementById('edit_admin_email').value,
                            admin_password: document.getElementById('edit_admin_pass').value
                        }
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Actualizando Sistema...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        await fetch(`${API_URL}/empresas/${emp.id}/info`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(result.value.info) });
                        await fetch(`${API_URL}/empresas/${emp.id}/credenciales`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(result.value.credenciales) });
                        Swal.fire('¡Actualizado!', 'Datos guardados correctamente.', 'success');
                        cargarEmpresasAPI();
                    } catch (e) { Swal.fire('Error', e.message, 'error'); }
                }
            });
        }

        // =========================================================
        // 6. ACCIONES FINANCIERAS Y DE ACCESO DE SUPER ADMIN
        // =========================================================
        function registrarPago(empresa_id, nombre_empresa) {
            Swal.fire({
                title: 'Registrar Ingreso',
                html: `
                    <div class="text-left text-sm text-slate-600 mb-4">Acreditando pago para: <b>${nombre_empresa}</b></div>
                    <div class="space-y-3 text-left">
                        <div><label class="block text-xs font-bold text-slate-500 uppercase">Monto Cobrado (Bs)</label><input type="number" id="swal_monto" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-emerald-500" placeholder="Ej. 150.00"></div>
                        <div><label class="block text-xs font-bold text-slate-500 uppercase">Periodo a Extender</label>
                            <select id="swal_tipo_pago" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                                <option value="Mensual">Mensualidad (+1 Mes)</option><option value="Anual">Anualidad (+1 Año)</option>
                            </select>
                        </div>
                        <div><label class="block text-xs font-bold text-slate-500 uppercase">N° Recibo / Transferencia</label><input type="text" id="swal_ref" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-emerald-500" placeholder="Ej. TR-987654"></div>
                    </div>
                `,
                showCancelButton: true, confirmButtonText: '<i class="fas fa-check mr-1"></i> Acreditar', confirmButtonColor: '#10b981', cancelButtonText: 'Cancelar',
                preConfirm: () => ({ monto: document.getElementById('swal_monto').value, tipo_pago: document.getElementById('swal_tipo_pago').value, referencia: document.getElementById('swal_ref').value })
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`${API_URL}/empresas/${empresa_id}/pagos`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(result.value) });
                        if(!res.ok) throw new Error((await res.json()).detail);
                        Swal.fire('¡Pago Acreditado!', (await res.json()).mensaje, 'success');
                        cargarEmpresasAPI(); 
                    } catch (e) { Swal.fire('Error', e.message, 'error'); }
                }
            });
        }

        async function verHistorialPagos(empresa_id, nombre_empresa) {
            Swal.fire({ title: 'Obteniendo Libros Contables...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${API_URL}/empresas/${empresa_id}/pagos`, { headers: { 'Authorization': `Bearer ${token}` } });
                const pagos = await res.json();
                let filas = '';
                if(pagos.length === 0) filas = `<tr><td colspan="4" class="text-center p-4 text-slate-500">No hay pagos registrados.</td></tr>`;
                else {
                    let total = 0;
                    pagos.forEach(p => {
                        total += parseFloat(p.monto);
                        filas += `<tr class="border-b border-slate-100 hover:bg-slate-50"><td class="p-2 text-xs">${p.fecha_pago}</td><td class="p-2 text-xs font-bold text-slate-700">${p.tipo_pago}</td><td class="p-2 text-xs font-mono text-slate-500">${p.comprobante_ref}</td><td class="p-2 text-xs font-bold text-emerald-600 text-right">Bs ${p.monto}</td></tr>`;
                    });
                    filas += `<tr class="bg-slate-50 font-bold"><td colspan="3" class="p-2 text-right text-xs uppercase text-slate-500">LTV (Total Facturado):</td><td class="p-2 text-sm text-emerald-700 text-right">Bs ${total.toFixed(2)}</td></tr>`;
                }
                Swal.fire({ title: `Historial: ${nombre_empresa}`, width: '600px', html: `<div class="mt-4 border border-slate-200 rounded-lg overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-100 text-slate-600 text-[10px] uppercase"><tr><th class="p-2">Fecha</th><th class="p-2">Concepto</th><th class="p-2">Ref.</th><th class="p-2 text-right">Monto</th></tr></thead><tbody>${filas}</tbody></table></div>`, confirmButtonText: 'Cerrar', confirmButtonColor: '#334155' });
            } catch (e) { Swal.fire('Error', 'No se pudo cargar el historial contable.', 'error'); }
        }

        async function entrarComoEmpresa(empresa_id) {
            Swal.fire({ title: 'Generando Pasaporte Seguro...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${API_URL}/superadmin/impersonate/${empresa_id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail);
                localStorage.setItem('token', data.token);
                localStorage.setItem('userData', JSON.stringify({ nombre: "Soporte (SuperAdmin)", rol: "admin", empresa: data.empresa_nombre, schema_name: data.schema_name }));
                window.location.href = 'dashboard_cliente.html';
            } catch (error) { Swal.fire('Error de Acceso', error.message, 'error'); }
        }

        async function eliminarEmpresa(id_empresa, nombre_empresa) {
            const result = await Swal.fire({
                title: 'Destrucción de Infraestructura',
                html: `Estás a punto de borrar a <b class="text-red-600">${nombre_empresa}</b>.<br>Escribe <b>DESTRUIR</b> para confirmar:`,
                input: 'text', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ejecutar Eliminación', cancelButtonText: 'Abortar',
                inputValidator: (value) => { if (value !== 'DESTRUIR') return 'Debe escribir la palabra exacta.' }
            });
            if (result.isConfirmed) {
                Swal.fire({ title: 'Destruyendo...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(`${API_URL}/empresas/${id_empresa}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    if (!res.ok) throw new Error((await res.json()).detail);
                    Swal.fire('Eliminado', 'Cliente eliminado correctamente', 'success');
                    cargarEmpresasAPI();
                    cargarKPIsGlobales();
                } catch (error) { Swal.fire('Error Crítico', error.message, 'error'); }
            }
        }

        async function cargarAuditoriaAPI() {
            const tbody = document.getElementById('tablaAuditoria');
            try {
                const res = await fetch(`${API_URL}/superadmin/auditoria`, { headers: { 'Authorization': `Bearer ${token}` } });
                const logs = await res.json();
                
                if(logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">No hay registros de auditoría almacenados.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                logs.forEach(log => {
                    let colorBadge = 'bg-blue-900 text-blue-300 border-blue-500';
                    if(log.nivel === 'WARNING') colorBadge = 'bg-amber-900 text-amber-300 border-amber-500';
                    if(log.nivel === 'CRITICAL') colorBadge = 'bg-red-900 text-red-300 border-red-500';

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800 transition-colors">
                            <td class="p-4 text-xs text-slate-400">${log.fecha}</td>
                            <td class="p-4"><span class="${colorBadge} px-2 py-1 rounded text-[10px] font-bold border border-opacity-30 uppercase">${log.nivel}</span></td>
                            <td class="p-4 text-emerald-400 text-xs">${log.usuario}</td>
                            <td class="p-4 text-[13px] text-slate-200">${log.accion}</td>
                        </tr>
                    `;
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">Error conectando con la base de datos de seguridad.</td></tr>';
            }
        }


        // =========================================================
        // INICIALIZACIÓN
        // =========================================================
        window.onload = () => cambiarVista('resumen', document.querySelector('.menu-btn'));
    </script>
