<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin - Centro de Comando SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 font-sans flex h-screen overflow-hidden text-slate-800">

    <div id="mobileOverlay" class="fixed inset-0 bg-slate-900 bg-opacity-50 z-20 hidden md:hidden transition-opacity" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-blue-400"><i class="fas fa-satellite-dish mr-2"></i>C.A Lector</h2>
                <p class="text-xs text-slate-400 mt-1 tracking-widest uppercase">Centro de Comando</p>
            </div>
            <button onclick="toggleMenu()" class="md:hidden text-slate-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="cambiarVista('resumen', this)" class="menu-btn w-full flex items-center p-3 bg-blue-600 rounded-lg text-white font-medium transition-colors shadow-sm">
                <i class="fas fa-chart-pie w-6"></i> Resumen Global
            </button>
            <button onclick="cambiarVista('empresas', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors">
                <i class="fas fa-building w-6"></i> Clientes / Empresas
            </button>
            <button onclick="cambiarVista('hardware', this)" class="menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors">
                <i class="fas fa-microchip w-6"></i> Monitor Hardware
            </button>
        </nav>
        
        <div class="p-4 border-t border-slate-800">
            <div class="mb-4 px-3">
                <p class="text-xs text-slate-400">Sesión Activa:</p>
                <p class="text-sm font-bold text-white truncate" id="userNameDisplay">Cargando...</p>
            </div>
            <button onclick="cerrarSesion()" class="flex items-center justify-center w-full p-3 text-red-400 hover:bg-red-500 hover:text-white border border-red-900 hover:border-red-500 rounded-lg transition-all text-sm font-bold">
                <i class="fas fa-power-off mr-2"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="bg-white shadow-sm border-b border-slate-200 p-4 flex justify-between items-center md:hidden z-10">
            <h1 class="text-lg font-bold text-slate-800"><i class="fas fa-satellite-dish text-blue-600 mr-2"></i>C.A Lector</h1>
            <button onclick="toggleMenu()" class="text-slate-600 hover:text-blue-600 focus:outline-none text-2xl">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <div id="contenedor-dinamico" class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="flex items-center justify-center h-full text-slate-400">
                <i class="fas fa-spinner fa-spin text-4xl"></i>
            </div>
        </div>
    </main>

    <script>
        // =========================================================
        // 1. CONFIGURACIÓN Y SEGURIDAD BASE
        // =========================================================
        const API_URL = "https://asistencia-api.up.railway.app";
        const token = localStorage.getItem('token');
        const userDataStr = localStorage.getItem('userData');

        if (!token || !userDataStr) window.location.href = 'index.html';
        const userData = JSON.parse(userDataStr);
        if (userData.rol !== 'superadmin') window.location.href = 'index.html';

        document.getElementById('userNameDisplay').textContent = userData.nombre;

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // =========================================================
        // 2. PLANTILLAS DE VISTAS (HTML EN MEMORIA)
        // =========================================================
        
        const VISTA_RESUMEN = `
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-slate-800">Resumen Global SaaS</h1>
                <p class="text-sm text-slate-500">Métricas en tiempo real de toda tu infraestructura.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Empresas Activas</p>
                    <p class="text-3xl font-bold text-slate-800 mt-2" id="kpi_empresas"><i class="fas fa-circle-notch fa-spin text-sm text-slate-300"></i></p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-emerald-500">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Relojes Conectados</p>
                    <p class="text-3xl font-bold text-slate-800 mt-2" id="kpi_relojes"><i class="fas fa-circle-notch fa-spin text-sm text-slate-300"></i></p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-amber-500">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Estado de Servidor</p>
                    <p class="text-3xl font-bold text-emerald-600 mt-2">Óptimo</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-purple-500">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Versión Core</p>
                    <p class="text-3xl font-bold text-slate-800 mt-2">2.0.1</p>
                </div>
            </div>
        `;

        const VISTA_EMPRESAS = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Gestión de Clientes (SaaS)</h1>
                    <p class="text-sm text-slate-500">Administra bases de datos, límites de usuarios y vencimientos.</p>
                </div>
                <button onclick="abrirModalEmpresa()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md transition-colors flex items-center justify-center">
                    <i class="fas fa-plus-circle mr-2"></i> Nuevo Cliente
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider border-b border-slate-200">
                                <th class="p-4 font-bold">Empresa / DB</th>
                                <th class="p-4 font-bold">Plan y Usuarios</th>
                                <th class="p-4 font-bold">Estado / Vencimiento</th>
                                <th class="p-4 font-bold text-right">Panel de Control</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEmpresas" class="text-sm divide-y divide-slate-100">
                            <tr><td colspan="4" class="p-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando infraestructura...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        const VISTA_CONSTRUCCION = `
            <div class="flex flex-col items-center justify-center h-[70vh] text-slate-400">
                <i class="fas fa-tools text-6xl mb-4 text-slate-300"></i>
                <h2 class="text-xl font-bold text-slate-600">Módulo en Construcción</h2>
                <p class="text-sm mt-2 text-center max-w-md">Esta sección del Centro de Comando se implementará en la siguiente fase táctica.</p>
            </div>
        `;

        // =========================================================
        // 3. MOTOR DE CAMBIO DE VISTAS (SPA ROUTER)
        // =========================================================
        
        function cambiarVista(vista, botonObj) {
            if(botonObj) {
                document.querySelectorAll('.menu-btn').forEach(btn => {
                    btn.className = "menu-btn w-full flex items-center p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-lg font-medium transition-colors";
                });
                botonObj.className = "menu-btn w-full flex items-center p-3 bg-blue-600 rounded-lg text-white font-medium transition-colors shadow-sm";
            }

            const contenedor = document.getElementById('contenedor-dinamico');
            if (vista === 'resumen') {
                contenedor.innerHTML = VISTA_RESUMEN;
                cargarKPIsGlobales();
            } else if (vista === 'empresas') {
                contenedor.innerHTML = VISTA_EMPRESAS;
                cargarEmpresasAPI();
            } else {
                contenedor.innerHTML = VISTA_CONSTRUCCION;
            }

            if(window.innerWidth < 768) toggleMenu();
        }

        // =========================================================
        // 4. LÓGICA DE NEGOCIO: EMPRESAS
        // =========================================================

        async function cargarKPIsGlobales() {
            try {
                const res = await fetch(`${API_URL}/superadmin/kpis`, { headers: { 'Authorization': `Bearer ${token}` } });
                const kpis = await res.json();
                document.getElementById('kpi_empresas').textContent = kpis.total_empresas;
                document.getElementById('kpi_relojes').textContent = kpis.relojes_online;
            } catch (e) { console.error("Error cargando KPIs"); }
        }

        async function cargarEmpresasAPI() {
            const tbody = document.getElementById('tablaEmpresas');
            try {
                const response = await fetch(`${API_URL}/empresas`, { headers: { 'Authorization': `Bearer ${token}` } });
                const empresas = await response.json(); 
                
                if (empresas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500 font-medium">No hay clientes SaaS aprovisionados.</td></tr>';
                    return;
                }

                tbody.innerHTML = ''; 
                empresas.forEach(emp => {
                    const usoPorcentaje = Math.round((emp.total_empleados / (emp.limite_usuarios || 50)) * 100) || 0;
                    const colorUso = usoPorcentaje > 90 ? 'bg-red-500' : (usoPorcentaje > 70 ? 'bg-yellow-500' : 'bg-blue-500');
                    
                    let badgeEstado = '<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-[10px] font-bold border border-emerald-200 uppercase">Al Día</span>';
                    let fechaVenc = emp.fecha_vencimiento || 'Sin Límite';
                    
                    if(emp.fecha_vencimiento) {
                        const diasRestantes = Math.ceil((new Date(emp.fecha_vencimiento) - new Date()) / (1000 * 60 * 60 * 24));
                        if(diasRestantes < 0) {
                            badgeEstado = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-[10px] font-bold border border-red-200 uppercase">Vencido</span>';
                        } else if (diasRestantes <= 15) {
                            badgeEstado = `<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-[10px] font-bold border border-amber-200 uppercase">Vence en ${diasRestantes} d</span>`;
                        }
                    }
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-blue-50 transition-colors group">
                            <td class="p-4">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 rounded-lg bg-slate-800 text-white flex items-center justify-center font-bold mr-3 shadow-inner">
                                        ${emp.nombre.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <p class="font-bold text-slate-800">${emp.nombre}</p>
                                        <p class="text-[11px] text-slate-500">NIT: ${emp.nit || 'N/A'} | ${emp.razon_social || ''}</p>
                                        <p class="text-[10px] font-mono text-blue-600 mt-0.5"><i class="fas fa-database mr-1"></i>${emp.schema_name}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="p-4">
                                <p class="text-sm font-bold text-slate-700">${emp.plan_nombre || 'Básico'}</p>
                                <div class="w-full bg-slate-200 rounded-full h-2 mb-1 mt-1 max-w-[150px]">
                                    <div class="${colorUso} h-2 rounded-full" style="width: ${usoPorcentaje > 100 ? 100 : usoPorcentaje}%"></div>
                                </div>
                                <p class="text-[11px] text-slate-500">${emp.total_empleados} de ${emp.limite_usuarios || 50} usuarios</p>
                            </td>
                            <td class="p-4">
                                ${badgeEstado}
                                <p class="text-[11px] text-slate-500 mt-1"><i class="far fa-calendar-alt mr-1"></i>${fechaVenc}</p>
                            </td>
                            <td class="p-4 text-right">
                                <div class="flex items-center justify-end space-x-2">
                                    <button onclick="registrarPago(${emp.id}, '${emp.nombre}')" class="bg-emerald-50 hover:bg-emerald-500 hover:text-white text-emerald-600 p-2 rounded-lg transition-colors" title="Registrar Pago">
                                        <i class="fas fa-hand-holding-usd"></i>
                                    </button>
                                    <button onclick="verHistorialPagos(${emp.id}, '${emp.nombre}')" class="bg-slate-100 hover:bg-slate-600 hover:text-white text-slate-600 p-2 rounded-lg transition-colors" title="Historial Contable">
                                        <i class="fas fa-file-invoice-dollar"></i>
                                    </button>
                                    <div class="w-px h-6 bg-slate-200 mx-1"></div>
                                    <button onclick="entrarComoEmpresa(${emp.id})" class="bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 p-2 rounded-lg transition-colors" title="Entrar al Panel">
                                        <i class="fas fa-sign-in-alt"></i>
                                    </button>
                                    <button onclick="eliminarEmpresa(${emp.id}, '${emp.nombre}')" class="text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors" title="Destruir">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500 font-bold"><i class="fas fa-exclamation-triangle mr-2"></i>Error conectando con el Core del servidor.</td></tr>`;
            }
        }

        function abrirModalEmpresa() {
            Swal.fire({
                title: 'Aprovisionar Nuevo Cliente',
                width: '600px',
                html: `
                    <div class="grid grid-cols-2 gap-4 text-left mt-2">
                        <div class="col-span-2"><h4 class="text-xs font-bold text-blue-600 uppercase border-b pb-1 mb-2">1. Datos de la Empresa</h4></div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Nombre Comercial</label>
                            <input type="text" id="swal_emp_nombre" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500" placeholder="Ej. Coca Cola">
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">NIT</label>
                            <input type="text" id="swal_emp_nit" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500" placeholder="Ej. 123456789">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Razón Social</label>
                            <input type="text" id="swal_emp_razon" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500" placeholder="Ej. Embotelladoras S.A.">
                        </div>

                        <div class="col-span-2 mt-2"><h4 class="text-xs font-bold text-blue-600 uppercase border-b pb-1 mb-2">2. Administrador (RRHH)</h4></div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Nombre Encargado</label>
                            <input type="text" id="swal_admin_nombre" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Correo de Acceso</label>
                            <input type="email" id="swal_admin_email" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Contraseña</label>
                            <input type="password" id="swal_admin_pass" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500" value="123456">
                        </div>

                        <div class="col-span-2 mt-2"><h4 class="text-xs font-bold text-blue-600 uppercase border-b pb-1 mb-2">3. Suscripción y Límites</h4></div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Plan Contratado</label>
                            <select id="swal_plan" onchange="document.getElementById('swal_limite').value = this.options[this.selectedIndex].dataset.lim" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500">
                                <option value="Básico" data-lim="50">Básico (50 usuarios)</option>
                                <option value="Pro" data-lim="200">Pro (200 usuarios)</option>
                                <option value="Industrial" data-lim="1000">Industrial (1000 usuarios)</option>
                            </select>
                        </div>
                        <div class="col-span-2 md:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Límite Real</label>
                            <input type="number" id="swal_limite" value="50" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 bg-slate-50">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase">Meses de Regalo / Prueba</label>
                            <select id="swal_meses" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500">
                                <option value="1">1 Mes (Trial)</option>
                                <option value="6">6 Meses (Semestral)</option>
                                <option value="12">12 Meses (Anual)</option>
                            </select>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-server mr-1"></i> Aprovisionar',
                confirmButtonColor: '#2563eb',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const d = {
                        nombre: document.getElementById('swal_emp_nombre').value,
                        nit: document.getElementById('swal_emp_nit').value,
                        razon_social: document.getElementById('swal_emp_razon').value,
                        admin_nombre: document.getElementById('swal_admin_nombre').value,
                        admin_email: document.getElementById('swal_admin_email').value,
                        admin_password: document.getElementById('swal_admin_pass').value,
                        plan_nombre: document.getElementById('swal_plan').value,
                        limite_usuarios: document.getElementById('swal_limite').value,
                        meses_regalo: document.getElementById('swal_meses').value
                    };
                    if(!d.nombre || !d.admin_nombre || !d.admin_email || !d.admin_password) {
                        Swal.showValidationMessage('Nombre, Admin, Correo y Contraseña son obligatorios.');
                        return false;
                    }
                    return d;
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Aprovisionando Servidor...', html: 'Creando esquema y base de datos aislada...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    try {
                        const res = await fetch(`${API_URL}/empresas`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(result.value)
                        });
                        const data = await res.json();
                        if(!res.ok) throw new Error(data.detail);
                        
                        Swal.fire('¡Éxito!', data.mensaje, 'success');
                        cargarEmpresasAPI();
                        cargarKPIsGlobales();
                    } catch (e) { Swal.fire('Error de Servidor', e.message, 'error'); }
                }
            });
        }

        // =========================================================
        // 5. MÓDULO FINANCIERO E IMPERSONATE
        // =========================================================

        function registrarPago(empresa_id, nombre_empresa) {
            Swal.fire({
                title: 'Registrar Ingreso',
                html: `
                    <div class="text-left text-sm text-slate-600 mb-4">Acreditando pago para: <b>${nombre_empresa}</b></div>
                    <div class="space-y-3 text-left">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase">Monto Cobrado (Bs / $)</label>
                            <input type="number" id="swal_monto" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-blue-500" placeholder="Ej. 150.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase">Periodo</label>
                            <select id="swal_tipo_pago" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-blue-500">
                                <option value="Mensual">Mensualidad (+1 Mes)</option>
                                <option value="Anual">Anualidad (+1 Año)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase">N° Recibo / Transferencia</label>
                            <input type="text" id="swal_ref" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:border-blue-500" placeholder="Ej. TR-987654">
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-check mr-1"></i> Acreditar y Extender',
                confirmButtonColor: '#10b981',
                preConfirm: () => {
                    return {
                        monto: document.getElementById('swal_monto').value,
                        tipo_pago: document.getElementById('swal_tipo_pago').value,
                        referencia: document.getElementById('swal_ref').value
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`${API_URL}/empresas/${empresa_id}/pagos`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify(result.value)
                        });
                        const data = await res.json();
                        if(!res.ok) throw new Error(data.detail);
                        
                        Swal.fire('¡Pago Acreditado!', data.mensaje, 'success');
                        cargarEmpresasAPI(); 
                    } catch (e) { Swal.fire('Error', e.message, 'error'); }
                }
            });
        }

        async function verHistorialPagos(empresa_id, nombre_empresa) {
            Swal.fire({ title: 'Obteniendo Libros Contables...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${API_URL}/empresas/${empresa_id}/pagos`, { headers: { 'Authorization': `Bearer ${token}` } });
                const pagos = await res.json();
                
                let filas = '';
                if(pagos.length === 0) {
                    filas = `<tr><td colspan="4" class="text-center p-4 text-slate-500">No hay pagos registrados para este cliente.</td></tr>`;
                } else {
                    let total = 0;
                    pagos.forEach(p => {
                        total += parseFloat(p.monto);
                        filas += `
                            <tr class="border-b border-slate-100 hover:bg-slate-50">
                                <td class="p-2 text-xs">${p.fecha_pago}</td>
                                <td class="p-2 text-xs font-bold text-slate-700">${p.tipo_pago}</td>
                                <td class="p-2 text-xs font-mono text-slate-500">${p.comprobante_ref}</td>
                                <td class="p-2 text-xs font-bold text-emerald-600 text-right">Bs ${p.monto}</td>
                            </tr>
                        `;
                    });
                    filas += `
                        <tr class="bg-slate-50 font-bold">
                            <td colspan="3" class="p-2 text-right text-xs uppercase text-slate-500">LTV (Total Facturado):</td>
                            <td class="p-2 text-sm text-emerald-700 text-right">Bs ${total.toFixed(2)}</td>
                        </tr>
                    `;
                }

                Swal.fire({
                    title: `Historial: ${nombre_empresa}`,
                    width: '600px',
                    html: `<div class="mt-4 border border-slate-200 rounded-lg overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-100 text-slate-600 text-[10px] uppercase"><tr><th class="p-2">Fecha</th><th class="p-2">Concepto</th><th class="p-2">Ref.</th><th class="p-2 text-right">Monto</th></tr></thead><tbody>${filas}</tbody></table></div>`,
                    confirmButtonText: 'Cerrar', confirmButtonColor: '#334155'
                });
            } catch (e) { Swal.fire('Error', 'No se pudo cargar el historial contable.', 'error'); }
        }

        async function entrarComoEmpresa(empresa_id) {
            Swal.fire({ title: 'Generando Pasaporte...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${API_URL}/superadmin/impersonate/${empresa_id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail);

                localStorage.setItem('token', data.token);
                localStorage.setItem('userData', JSON.stringify({ nombre: "Soporte (SuperAdmin)", rol: "admin", empresa: data.empresa_nombre, schema_name: data.schema_name }));
                window.location.href = 'planilla.html';
            } catch (error) { Swal.fire('Error de Acceso', error.message, 'error'); }
        }

        async function eliminarEmpresa(id_empresa, nombre_empresa) {
            const result = await Swal.fire({
                title: 'Destrucción de Infraestructura',
                html: `Estás a punto de ejecutar un DROP SCHEMA sobre <b class="text-red-600">${nombre_empresa}</b>.<br><br>Escribe <b>DESTRUIR</b> para confirmar:`,
                input: 'text', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Ejecutar Eliminación', cancelButtonText: 'Abortar',
                inputValidator: (value) => { if (value !== 'DESTRUIR') return 'Debe escribir la palabra exacta.' }
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'Destruyendo Base de Datos...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(`${API_URL}/empresas/${id_empresa}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail);
                    Swal.fire('Eliminado', data.mensaje, 'success');
                    cargarEmpresasAPI();
                } catch (error) { Swal.fire('Error Crítico', error.message, 'error'); }
            }
        }

        // 🚀 INICIALIZACIÓN
        window.onload = () => cambiarVista('resumen', document.querySelector('.menu-btn'));
    </script>
</body>
</html>
