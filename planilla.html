<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilla - C.A Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden text-gray-800">

    <aside id="menu-lateral" class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-xl z-20"></aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="bg-white shadow-sm border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-800" id="tituloPlanilla">Planilla de Empresa</h1>
                <p class="text-sm text-gray-500">Gestión integral de empleados y accesos</p>
            </div>
            <button onclick="abrirPanelNuevo()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors flex items-center">
                <i class="fas fa-user-plus mr-2"></i> Nuevo Personal
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6">
                <div class="flex space-x-2 mb-4 border-b border-gray-100 pb-4">
                    <button onclick="simularFiltro('activos', this)" class="filtro-btn px-4 py-2 bg-blue-50 text-blue-700 font-semibold rounded-lg text-sm border border-blue-200 transition-colors">
                        <i class="fas fa-user-check mr-2"></i>Activos (1)
                    </button>
                    <button onclick="simularFiltro('inactivos', this)" class="filtro-btn px-4 py-2 bg-white hover:bg-gray-50 text-gray-600 font-medium rounded-lg text-sm border border-gray-200 transition-colors">
                        <i class="fas fa-user-times mr-2"></i>Inactivos (0)
                    </button>
                    <button onclick="simularFiltro('todos', this)" class="filtro-btn px-4 py-2 bg-white hover:bg-gray-50 text-gray-600 font-medium rounded-lg text-sm border border-gray-200 transition-colors">
                        <i class="fas fa-users mr-2"></i>Todos (1)
                    </button>
                </div>

                <!-- ── MODIFICACIÓN 1: CUADRÍCULA DE 4 COLUMNAS PARA FILTROS SEPARADOS ── -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Buscar Empleado</label>
                        <div class="relative mt-1">
                            <i class="fas fa-search absolute left-3 top-2.5 text-gray-400"></i>
                            <input type="text" onkeyup="simularBusqueda(this.value)" placeholder="Nombre, C.I. o ID Lector..." class="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    
                    <!-- NUEVO FILTRO: SUCURSAL (FÍSICA) -->
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Sucursal (Ubicación)</label>
                        <select onchange="simularFiltroSelect(this.value)" class="mt-1 w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="todas">Todas las sucursales</option>
                            <option value="Central">Central</option>
                            <option value="Planta">Planta El Alto</option>
                        </select>
                    </div>

                    <!-- NUEVO FILTRO: SECCIÓN (LÓGICA) -->
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Sección (Depto)</label>
                        <select onchange="simularFiltroSelect(this.value)" class="mt-1 w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="todas">Todas las secciones</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                            <option value="Produccion">Producción</option>
                            <option value="Administracion">Administración</option>
                        </select>
                    </div>

                    <!-- FILTRO EXISTENTE: CARGO -->
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase">Cargo</label>
                        <select onchange="simularFiltroSelect(this.value)" class="mt-1 w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="todos">Todos los cargos</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Operario">Operario de Planta</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 overflow-hidden flex flex-col">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
                                <th class="p-4 font-semibold">ID Lector</th>
                                <th class="p-4 font-semibold">Empleado</th>
                                <th class="p-4 font-semibold">C.I.</th>
                                <!-- ── MODIFICACIÓN 2: COLUMNAS SEPARADAS EN LA TABLA ── -->
                                <th class="p-4 font-semibold">Sucursal</th>
                                <th class="p-4 font-semibold">Sección</th>
                                <th class="p-4 font-semibold">Cargo</th>
                                <th class="p-4 font-semibold">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="text-sm divide-y divide-gray-100">
                            <tr>
                                <td colspan="7" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando personal...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="overlayPanel" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-30 hidden transition-opacity backdrop-blur-sm" onclick="cerrarPanel()"></div>
        
        <div id="panelDerecho" class="fixed inset-y-0 right-0 w-full md:w-[500px] bg-white shadow-2xl z-40 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
            
            <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-white">
                <div>
                    <h3 class="text-xl font-bold text-gray-800" id="drawerTitle">Nuevo Personal</h3>
                    <span id="badgeModo" class="hidden mt-1 text-xs font-semibold px-2 py-1 bg-yellow-100 text-yellow-800 rounded-full border border-yellow-200"><i class="fas fa-lock mr-1"></i>Modo Lectura</span>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button id="btnHabilitarEdicion" onclick="habilitarEdicion()" class="hidden bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors border border-gray-300">
                        <i class="fas fa-edit mr-1"></i> Editar
                    </button>
                    <button onclick="cerrarPanel()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
                <form id="empleadoForm" class="space-y-6">
                    
                   <div class="flex items-center space-x-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                        <div class="h-16 w-16 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 border-2 border-dashed border-gray-300 cursor-pointer hover:bg-gray-100 relative overflow-hidden">
                            <i class="fas fa-camera text-xl"></i>
                            <input type="file" id="fotoInput" class="absolute inset-0 opacity-0 cursor-pointer form-input" accept="image/*">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-blue-600 uppercase">ID Lector Biométrico</label>
                            <input type="number" id="bioId" placeholder="Ej. 102" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 text-lg font-bold disabled:bg-gray-100 disabled:text-gray-500">
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                        <h4 class="font-bold text-gray-800 border-b pb-2"><i class="far fa-id-card mr-2 text-gray-400"></i>Datos Personales</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Nombres</label>
                                <input type="text" id="emp_nombres" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Apellidos</label>
                                <input type="text" id="emp_apellidos" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">C.I.</label>
                                <input type="text" id="emp_ci" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Sexo</label>
                                <select class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                    <option>Masculino</option>
                                    <option>Femenino</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Celular</label>
                                <input type="tel" placeholder="Ej. 70012345" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Correo</label>
                                <input type="email" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Dirección de Domicilio</label>
                                <input type="text" placeholder="Ej. Zona Sur, Calle 3, #123" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                        <h4 class="font-bold text-gray-800 border-b pb-2"><i class="fas fa-briefcase mr-2 text-gray-400"></i>Datos Laborales</h4>
                        <div class="grid grid-cols-2 gap-4">
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Fecha de Ingreso</label>
                                <input type="date" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700" title="Fecha desde la cual se calculan los 3 meses y vacaciones">Inicio Antigüedad <i class="fas fa-info-circle text-blue-400"></i></label>
                                <input type="date" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                            </div>

                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Cargo</label>
                                <input list="lista-cargos" id="emp_cargo" placeholder="Escriba o seleccione..." class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                <datalist id="lista-cargos">
                                    <option value="Administrador">
                                    <option value="Operario de Planta">
                                    <option value="Supervisor">
                                    <option value="Guardia de Seguridad">
                                </datalist>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700" title="Lugar Físico">Sucursal</label>
                                <select id="emp_sucursal" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                    <option value="">Cargando...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700" title="Departamento Organizacional">Sección</label>
                                <select id="emp_seccion" class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                    <option value="">Cargando...</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700">Contrato</label>
                                <select class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                    <option>Ítem</option>
                                    <option selected>Eventual</option>
                                    <option>Consultoría</option>
                                </select>
                            </div>

                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Turno Asignado</label>
                                <select class="form-input mt-1 w-full px-3 py-2 border border-gray-300 rounded-md text-sm disabled:bg-gray-100">
                                    <option>Administración (08:00 - 16:00)</option>
                                    <option>Nocturno (22:00 - 06:00)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Salario Base</label>
                                <div class="relative mt-1">
                                    <span class="absolute left-3 top-2 text-gray-500">Bs.</span>
                                    <input type="number" class="form-input w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md shadow-sm text-sm disabled:bg-gray-100">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Bono Adicional</label>
                                <div class="relative mt-1">
                                    <span class="absolute left-3 top-2 text-gray-500">Bs.</span>
                                    <input type="number" class="form-input w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md shadow-sm text-sm disabled:bg-gray-100">
                                </div>
                            </div>

                        </div>
                    </div>

                    <div id="zonaSeguridad" class="hidden bg-white p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                        <h4 class="font-bold text-gray-800 border-b pb-2"><i class="fas fa-shield-alt mr-2 text-gray-400"></i>Estado del Empleado</h4>
                        
                        <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-200">
                            <div><p class="font-semibold text-gray-800">Empleado Activo</p></div>
                            
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggleEstado" class="form-input sr-only peer" checked onchange="manejarCambioEstado()" disabled>
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                            </label>
                        </div>
                        
                        <div id="panelConfirmacion" class="hidden bg-red-50 border border-red-200 p-4 rounded-lg space-y-3 mt-4">
                            <p class="text-sm font-bold text-red-700" id="textoConfirmacion">Confirmar Retiro de Personal</p>
                            <div>
                                <label class="block text-xs font-medium text-red-700">Fecha Efectiva del Movimiento</label>
                                <input type="date" class="mt-1 w-full px-3 py-2 border border-red-300 rounded-md text-sm focus:ring-red-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-red-700">Motivo / Comentario</label>
                                <input type="text" placeholder="Ej. Renuncia voluntaria" class="mt-1 w-full px-3 py-2 border border-red-300 rounded-md text-sm focus:ring-red-500">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-red-700"><i class="fas fa-lock mr-1"></i> Contraseña de Admin</label>
                                <input type="password" placeholder="Requerido para cambios" class="mt-1 w-full px-3 py-2 border border-red-300 rounded-md text-sm focus:ring-red-500">
                            </div>
                        </div>

                    </div> 

                </form>
            </div>

            <div class="p-6 border-t border-gray-200 bg-white flex items-center justify-between">
                <button id="btnEliminar" onclick="solicitarBorrado()" class="hidden text-red-500 hover:text-red-700 font-medium text-sm px-3 py-2 rounded transition-colors disabled:opacity-50">
                    <i class="fas fa-trash-alt mr-1"></i> Eliminar
                </button>
                
                <div class="flex space-x-3 ml-auto">
                    <button onclick="cerrarPanel()" class="bg-white border border-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-50 font-medium text-sm">Cerrar</button>
                    <button id="btnGuardar" onclick="guardarEmpleado()" class="hidden bg-blue-600 text-white px-8 py-2 rounded-lg hover:bg-blue-700 font-medium shadow-sm text-sm">Guardar Cambios</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const userDataStr = localStorage.getItem('userData');
        if (!userDataStr) window.location.href = 'index.html';
        const userData = JSON.parse(userDataStr);
        
        // Validamos si los elementos existen antes de tocarlos para evitar el "Fallo en Cascada"
        const displayEmpresa = document.getElementById('empresaNameDisplay');
        if(displayEmpresa) displayEmpresa.textContent = userData.empresa;

        const tituloPlanilla = document.getElementById('tituloPlanilla');
        if(tituloPlanilla) tituloPlanilla.textContent = `Planilla de ${userData.empresa}`;

        // Ahora estas variables se crearán correctamente
        const panel = document.getElementById('panelDerecho');
        const overlay = document.getElementById('overlayPanel');
        const inputsFormulario = document.querySelectorAll('.form-input');

        //VARIABLES PÁRA CONEXIÓN CON SERVIDOR Y EDICIÓN DE PERESONAL
        const API_URL = "https://asistencia-api.up.railway.app";
        const token_api = localStorage.getItem('token'); // Usamos token_api para no chocar con tu const 'token' si la hay
        let listaEmpleadosGlobal = [];
        let empleadoEditandoId = null;


        function cerrarPanel() {
            panel.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        }

        function abrirPanelNuevo() {
            empleadoEditandoId = null;
            document.getElementById('drawerTitle').textContent = "Registrar Nuevo Personal";
            document.getElementById('zonaSeguridad').classList.add('hidden');
            document.getElementById('btnEliminar').classList.add('hidden');
            document.getElementById('badgeModo').classList.add('hidden');
            document.getElementById('btnHabilitarEdicion').classList.add('hidden');
            
            document.getElementById('empleadoForm').reset();
            
            inputsFormulario.forEach(input => input.disabled = false);
            
            document.getElementById('btnGuardar').classList.remove('hidden');
            document.getElementById('btnGuardar').textContent = "Registrar Empleado";

            panel.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
        }

        function abrirPanelEdicion(idEmpleado) {
            empleadoEditandoId = idEmpleado;
            // 1. Buscamos al empleado exacto en nuestra memoria
            const emp = listaEmpleadosGlobal.find(e => e.id === idEmpleado);
            if(!emp) return;

            // 2. Cambiamos el título
            document.getElementById('drawerTitle').textContent = "Perfil: " + emp.nombres;
            
            // 3. Inyectamos los datos en los inputs del formulario
            document.getElementById('bioId').value = emp.bio_id || '';
            document.getElementById('emp_nombres').value = emp.nombres || '';
            document.getElementById('emp_apellidos').value = emp.apellidos || '';
            document.getElementById('emp_ci').value = emp.ci || '';
            document.getElementById('emp_cargo').value = emp.cargo || '';
            
            // Seleccionamos la sucursal y sección correctas
            if(emp.sucursal_id) document.getElementById('emp_sucursal').value = emp.sucursal_id;
            if(emp.seccion_id) document.getElementById('emp_seccion').value = emp.seccion_id;

            // 4. Preparamos la interfaz visual (Modo Lectura)
            document.getElementById('zonaSeguridad').classList.remove('hidden');
            document.getElementById('badgeModo').classList.remove('hidden');
            document.getElementById('btnHabilitarEdicion').classList.remove('hidden');
            
            document.getElementById('btnEliminar').classList.add('hidden'); 
            document.getElementById('btnGuardar').classList.add('hidden');  
            
            // Bloqueamos los campos para que no editen sin querer
            inputsFormulario.forEach(input => input.disabled = true);

            // 5. Abrimos el panel
            panel.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
        }

        function habilitarEdicion() {
            document.getElementById('badgeModo').classList.add('hidden');
            document.getElementById('btnHabilitarEdicion').classList.add('hidden');
            
            document.getElementById('btnEliminar').classList.remove('hidden');
            document.getElementById('btnGuardar').classList.remove('hidden');
            document.getElementById('btnGuardar').textContent = "Guardar Cambios";
            
            inputsFormulario.forEach(input => input.disabled = false);
        }

        let estadoOriginalActivo = true; 

        function manejarCambioEstado() {
            const toggle = document.getElementById('toggleEstado');
            const panelConf = document.getElementById('panelConfirmacion');
            const textoConf = document.getElementById('textoConfirmacion');

            if (toggle.checked !== estadoOriginalActivo) {
                panelConf.classList.remove('hidden'); 
                
                if (!toggle.checked) { 
                    textoConf.textContent = "Confirmar RETIRO de Personal";
                    panelConf.className = "bg-red-50 border border-red-200 p-4 rounded-lg space-y-3 mt-4";
                } else { 
                    textoConf.textContent = "Confirmar REINTEGRO de Personal";
                    panelConf.className = "bg-green-50 border border-green-200 p-4 rounded-lg space-y-3 mt-4";
                }
            } else {
                panelConf.classList.add('hidden');
            }
        }

        function solicitarBorrado() {
            alert("⚠️ ACCIÓN CRÍTICA\nEsto realizará un Soft Delete (Borrado Lógico) del empleado en la Base de Datos. Requerirá confirmación por contraseña.");
        }

        // ── 6. CÓDIGO TEMPORAL: MOCKING DE FILTROS (CORREGIDO) ──
        function simularFiltro(tipo, botonPresionado) {
            // Solo cambiamos el color del botón visualmente para que no se congele
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.className = "filtro-btn px-4 py-2 bg-white hover:bg-gray-50 text-gray-600 font-medium rounded-lg text-sm border border-gray-200 transition-colors";
            });
            botonPresionado.className = "filtro-btn px-4 py-2 bg-blue-50 text-blue-700 font-semibold rounded-lg text-sm border border-blue-200 transition-colors";
            console.log("Filtro seleccionado: " + tipo + " (Filtro real en construcción)");
        }

        function simularBusqueda(texto) {
            console.log("Buscando: " + texto + " (Búsqueda real en construcción)");
        }

        function simularFiltroSelect(valor) {
            console.log("Filtro select cambiado a: " + valor + " (Filtro real en construcción)");
        }

        // ==============================================================================
        // ── MOTOR DE DATOS: CONEXIÓN CON LA API ──
        // ==============================================================================

        // 1. Cargar las listas desplegables (Sucursal y Sección)
        async function cargarCatalogos() {
            try {
                const [resSucursales, resSecciones] = await Promise.all([
                    fetch(`${API_URL}/sucursales`, { headers: { 'Authorization': `Bearer ${token_api}` } }),
                    fetch(`${API_URL}/secciones`, { headers: { 'Authorization': `Bearer ${token_api}` } })
                ]);

                const sucursales = await resSucursales.json();
                const secciones = await resSecciones.json();

                const selectSucursal = document.getElementById('emp_sucursal');
                selectSucursal.innerHTML = '<option value="">Seleccione Sucursal...</option>';
                sucursales.forEach(s => {
                    selectSucursal.innerHTML += `<option value="${s.id}">${s.nombre}</option>`;
                });

                const selectSeccion = document.getElementById('emp_seccion');
                selectSeccion.innerHTML = '<option value="">Seleccione Sección...</option>';
                secciones.forEach(s => {
                    selectSeccion.innerHTML += `<option value="${s.id}">${s.nombre}</option>`;
                });

            } catch (error) {
                console.error("Error al cargar catálogos:", error);
            }
        }

        // 2. Cargar la Tabla de Empleados desde Railway
        async function cargarEmpleados() {
            const tbody = document.getElementById('cuerpoTabla');
            try {
                const res = await fetch(`${API_URL}/empleados`, { headers: { 'Authorization': `Bearer ${token_api}` } });
                const data = await res.json();
                
                listaEmpleadosGlobal = data; // <--- GUARDAMOS LOS DATOS AQUÍ
                
                tbody.innerHTML = '';
                if(!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-gray-500">No hay personal registrado</td></tr>';
                    return;
                }
                
                data.forEach(emp => {
                    const iniciales = (emp.nombres.charAt(0) + emp.apellidos.charAt(0)).toUpperCase();
                    // AÑADIMOS EL ONCLICK AQUÍ ABAJO PASANDO EL ID DEL EMPLEADO
                    tbody.innerHTML += `
                        <tr onclick="abrirPanelEdicion(${emp.id})" class="hover:bg-blue-50 transition-colors cursor-pointer group">
                            <td class="p-4 font-mono text-gray-500">${emp.bio_id || '-'}</td>
                            <td class="p-4">
                                <div class="flex items-center">
                                    <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3">${iniciales}</div>
                                    <p class="font-bold text-gray-800 group-hover:text-blue-600">${emp.nombres} ${emp.apellidos}</p>
                                </div>
                            </td>
                            <td class="p-4">${emp.ci}</td>
                            <td class="p-4">${emp.sucursal_nombre || '-'}</td>
                            <td class="p-4">${emp.seccion_nombre || '-'}</td>
                            <td class="p-4">${emp.cargo || '-'}</td>
                            <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-semibold">Activo</span></td>
                        </tr>`;
                });
            } catch (error) { tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-red-500">Error de conexión con Railway</td></tr>'; }
        }

        // 3. Enviar el Formulario al Backend (Horario NO obligatorio)
        async function guardarEmpleado() {
            const btn = document.getElementById('btnGuardar');
            
            const payload = {
                bio_id: document.getElementById('bioId').value ? parseInt(document.getElementById('bioId').value) : null,
                nombres: document.getElementById('emp_nombres').value,
                apellidos: document.getElementById('emp_apellidos').value,
                ci: document.getElementById('emp_ci').value,
                cargo: document.getElementById('emp_cargo').value,
                sucursal_id: parseInt(document.getElementById('emp_sucursal').value),
                seccion_id: parseInt(document.getElementById('emp_seccion').value)
            };

            if(!payload.nombres || !payload.ci || !payload.sucursal_id) {
                return alert("Completa los campos obligatorios (Nombres, C.I., Sucursal).");
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

            // AQUÍ ESTÁ LA MAGIA: Decidimos la ruta y el método
            const metodoHTTP = empleadoEditandoId ? 'PUT' : 'POST';
            const urlFinal = empleadoEditandoId 
                ? `${API_URL}/empleados/${empleadoEditandoId}` // Si existe, actualiza
                : `${API_URL}/empleados`;                     // Si no, crea

            try {
                const res = await fetch(urlFinal, {
                    method: metodoHTTP,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token_api}` },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail || "Error al guardar");
                
                cerrarPanel();
                await cargarEmpleados(); // Recarga la tabla con los datos frescos
            } catch (error) { 
                alert(`Error: ${error.message}`); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = empleadoEditandoId ? 'Guardar Cambios' : 'Registrar Empleado'; 
            }
        }

        // 4. Iniciar la pantalla ordenadamente (Añade esta función al final de todo el JS)
        async function arrancarPantallaPlanilla() {
            await cargarCatalogos();
            await cargarEmpleados();
        }
        
        arrancarPantallaPlanilla();

    </script>
