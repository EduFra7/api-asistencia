<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectores Biométricos - BITECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden text-gray-800">

    <aside id="menu-lateral" class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-xl z-20 shrink-0 transition-transform"></aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="bg-white shadow-sm border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Lectores Biométricos</h1>
                <p class="text-sm text-gray-500">Administración de equipos ZKTeco (Red ADMS)</p>
            </div>
            <button onclick="abrirModal(null)" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition-colors flex items-center text-sm">
                <i class="fas fa-plus mr-2"></i> Añadir Lector
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Estado</th>
                            <th class="px-6 py-4">Equipo / Marca</th>
                            <th class="px-6 py-4">Ubicación (Sucursal)</th>
                            <th class="px-6 py-4">Número de Serie (SN)</th>
                            <th class="px-6 py-4">Último Ping</th>
                            <th class="px-6 py-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLectores" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalLector" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-emerger">
            <div class="bg-slate-800 p-4 flex justify-between items-center">
                <h2 id="modalTitle" class="text-white font-bold text-lg">Configurar Lector</h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="lectorId">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre Identificador</label>
                    <input type="text" id="lectorNombre" placeholder="Ej. Lector Principal Oficina" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Número de Serie (SN)</label>
                    <input type="text" id="lectorSN" placeholder="Ej. CJT42345432" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono text-blue-700">
                    <p class="text-[10px] text-gray-400 mt-1">El SN debe coincidir exactamente con el del reloj físico.</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Marca / Modelo</label>
                        <input type="text" id="lectorMarca" placeholder="Ej. ZKTeco K40" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Sucursal Asignada</label>
                        <select id="lectorSucursal" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">(Ninguna)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2">
                <button onclick="cerrarModal()" class="px-4 py-2 text-sm font-bold text-gray-600 hover:bg-gray-200 rounded-lg">Cancelar</button>
                <button onclick="guardarLector()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow">Guardar Equipo</button>
            </div>
        </div>
    </div>

    <script src="menu.js"></script>
    <script>
        const API_URL = "https://asistencia-api.up.railway.app";
        const token_api = localStorage.getItem('token');
        let dataLectores = [];

        async function init() {
            renderizarMenu('lectores');
            await cargarSucursales();
            cargarLectores();
        }

        async function cargarSucursales() {
            try {
                const res = await fetch(`${API_URL}/sucursales`, { headers: { 'Authorization': `Bearer ${token_api}` }});
                const sucursales = await res.json();
                const select = document.getElementById('lectorSucursal');
                sucursales.forEach(s => select.innerHTML += `<option value="${s.id}">${s.nombre}</option>`);
            } catch (e) { console.error(e); }
        }

        async function cargarLectores() {
            const tbody = document.getElementById('tablaLectores');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><p>Escaneando red de dispositivos...</p></td></tr>';
            try {
                const res = await fetch(`${API_URL}/lectores`, { headers: { 'Authorization': `Bearer ${token_api}` }});
                dataLectores = await res.json();
                
                if (dataLectores.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No hay lectores registrados en el sistema.</td></tr>';
                    return;
                }

                tbody.innerHTML = dataLectores.map(l => {
                    const online = l.estado === 'online';
                    const color = online ? 'text-emerald-500' : 'text-red-500';
                    const icono = online ? 'fa-check-circle' : 'fa-times-circle';
                    const estadoText = online ? 'En Línea' : 'Desconectado';
                    
                    return `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="px-6 py-4 font-bold ${color} text-xs"><i class="fas ${icono} mr-1"></i>${estadoText}</td>
                        <td class="px-6 py-4">
                            <p class="font-bold text-gray-800">${l.nombre}</p>
                            <p class="text-[10px] text-gray-500">${l.marca_modelo || 'Modelo no especificado'}</p>
                        </td>
                        <td class="px-6 py-4"><span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold border border-gray-200"><i class="fas fa-building text-gray-400 mr-1"></i>${l.sucursal_nombre || 'Global'}</span></td>
                        <td class="px-6 py-4 font-mono text-xs text-blue-700 bg-blue-50 rounded px-2">${l.numero_serie}</td>
                        <td class="px-6 py-4 text-xs text-gray-500"><i class="far fa-clock mr-1"></i>${l.ultima_conexion || 'Nunca'}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="abrirModal(${l.id})" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 p-2 rounded mr-1 transition-colors"><i class="fas fa-edit"></i></button>
                            <button onclick="eliminarLector(${l.id})" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded transition-colors"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">Error de conexión con el servidor.</td></tr>';
            }
        }

        function abrirModal(id) {
            document.getElementById('lectorId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Editar Lector' : 'Nuevo Lector';
            document.getElementById('lectorSN').disabled = !!id; // No permitimos editar el SN una vez creado

            if (id) {
                const lector = dataLectores.find(l => l.id === id);
                document.getElementById('lectorNombre').value = lector.nombre;
                document.getElementById('lectorSN').value = lector.numero_serie;
                document.getElementById('lectorMarca').value = lector.marca_modelo || '';
                document.getElementById('lectorSucursal').value = lector.sucursal_id || '';
            } else {
                document.getElementById('lectorNombre').value = '';
                document.getElementById('lectorSN').value = '';
                document.getElementById('lectorMarca').value = '';
                document.getElementById('lectorSucursal').value = '';
            }
            
            document.getElementById('modalLector').classList.replace('hidden', 'flex');
        }

        function cerrarModal() { document.getElementById('modalLector').classList.replace('flex', 'hidden'); }

        async function guardarLector() {
            const id = document.getElementById('lectorId').value;
            const payload = {
                nombre: document.getElementById('lectorNombre').value,
                numero_serie: document.getElementById('lectorSN').value,
                marca_modelo: document.getElementById('lectorMarca').value,
                sucursal_id: document.getElementById('lectorSucursal').value || null
            };

            Swal.fire({ title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const url = id ? `${API_URL}/lectores/${id}` : `${API_URL}/lectores`;
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token_api}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                
                mostrarExito(data.mensaje);
                cerrarModal();
                cargarLectores();
            } catch (e) { mostrarError(e.message); }
        }

        async function eliminarLector(id) {
            if (await pedirConfirmacion("¿Desvincular y eliminar este equipo?", "Esta acción no borrará los marcajes ya recibidos.")) {
                try {
                    const res = await fetch(`${API_URL}/lectores/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token_api}` }});
                    if (res.ok) { mostrarExito("Equipo eliminado"); cargarLectores(); }
                } catch(e) { mostrarError("Fallo al eliminar."); }
            }
        }

        init();
    </script>
</body>
</html>
